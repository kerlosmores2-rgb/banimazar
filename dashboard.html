<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - منظومة إدارة المحطات</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', sans-serif; background: #f0f2f5; overflow-x: hidden; }
        .wrapper { display: flex; width: 100%; min-height: 100vh; }
        #sidebar {
            width: 280px;
            background: #1e2a3e;
            color: white;
            transition: all 0.3s;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            z-index: 1000;
        }
        #sidebar.active { margin-right: -280px; }
        .sidebar-header { padding: 20px; background: #0d6efd; text-align: center; }
        #sidebar ul li a {
            padding: 15px 20px;
            display: block;
            color: #bdc3c7;
            text-decoration: none;
            border-bottom: 1px solid #2c3e50;
            transition: 0.3s;
            cursor: pointer;
        }
        #sidebar ul li a:hover { background: #2c3e50; color: white; padding-right: 30px; }
        #sidebar ul ul { display: none; background: #161f2c; list-style: none; }
        #sidebar ul ul li a { padding-right: 40px; font-size: 0.9rem; border: none; }
        #content { flex: 1; width: 100%; padding: 20px; transition: all 0.3s; }
        .navbar { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h4>نظام الإدارة</h4>
                <small id="userDisplayName">جاري التحميل...</small>
            </div>
            <ul class="list-unstyled">
                <li><a onclick="loadPage('home')"><i class="fas fa-home ms-2"></i> الرئيسية</a></li>
                
                <li>
                    <a onclick="toggleSubMenu('stationsMenu')"><i class="fas fa-industry ms-2"></i> المحطات <i class="fas fa-chevron-down float-end mt-1"></i></a>
                    <ul id="stationsMenu">
                        <li><a onclick="loadPage('addStation')">إضافة محطة جديدة</a></li>
                        <li><a onclick="loadPage('listStations')">عرض جميع المحطات</a></li>
                    </ul>
                </li>

                <li>
                    <a onclick="toggleSubMenu('faultsMenu')"><i class="fas fa-tools ms-2"></i> الأعطال والصيانة <i class="fas fa-chevron-down float-end mt-1"></i></a>
                    <ul id="faultsMenu">
                        <li><a onclick="loadPage('addFault')">إبلاغ عن عطل</a></li>
                        <li><a onclick="loadPage('listFaults')">سجل الأعطال</a></li>
                    </ul>
                </li>

                <li><a onclick="loadPage('users')"><i class="fas fa-users-cog ms-2"></i> إدارة المستخدمين</a></li>
                <li><a onclick="logout()" class="text-danger"><i class="fas fa-sign-out-alt ms-2"></i> تسجيل الخروج</a></li>
            </ul>
        </nav>

        <div id="content">
            <nav class="navbar d-flex justify-content-between">
                <button type="button" id="toggleSidebar" class="btn btn-primary">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="fw-bold text-primary">فرع بني مزار - محطات الصرف الصحي</span>
            </nav>

            <div id="pageContent">
                <div class="text-center mt-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">جاري تحميل البيانات...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js" charset="utf-8"></script>

    <script>
        // 1. التحقق الفوري من الجلسة لمنع "الدخول والخروج المباشر"
        const userSession = sessionStorage.getItem('loggedUser');
        if (!userSession) {
            window.location.href = 'index.html';
        } else {
            const user = JSON.parse(userSession);
            document.getElementById('userDisplayName').textContent = user.name || user.username;
        }

        // 2. دالة القوائم الفرعية
        function toggleSubMenu(id) {
            const menu = document.getElementById(id);
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'block';
            }
        }

        // 3. التحكم في السايدبار
        document.getElementById('toggleSidebar').onclick = function() {
            document.getElementById('sidebar').classList.toggle('active');
        };

        // 4. دالة تسجيل الخروج
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        // 5. تحميل الصفحة الرئيسية عند بدء التشغيل
        window.onload = function() {
            if (typeof loadPage === 'function') {
                loadPage('home');
            } else {
                // محاولة أخيرة إذا تأخر تحميل app.js
                setTimeout(() => {
                    if (typeof loadPage === 'function') loadPage('home');
                }, 1000);
            }
        };
    </script>
</body>
</html>
