<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - محطات بني مزار</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* التنسيقات الخاصة بك */
        body { font-family: 'Tahoma', sans-serif; background: #f0f2f5; }
        .wrapper { display: flex; width: 100%; min-height: 100vh; }
        #sidebar { width: 280px; background: #1e2a3e; color: white; height: 100vh; position: sticky; top: 0; }
        #sidebar ul { list-style: none; padding: 0; }
        #sidebar ul li a { padding: 15px; display: block; color: white; text-decoration: none; border-bottom: 1px solid #2c3e50; cursor: pointer; }
        #sidebar ul li a:hover { background: #0d6efd; }
        #sidebar ul ul { display: none; background: #161f2c; }
        #content { flex: 1; padding: 20px; overflow-y: auto; }
        .stats-card { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="p-4 text-center bg-primary">
                <h4>نظام الإدارة</h4>
            </div>
            <ul>
                <li><a onclick="loadPage('home')"><i class="fas fa-home ms-2"></i>الرئيسية</a></li>
                <li>
                    <a onclick="toggleSubMenu('stationsSub')"><i class="fas fa-industry ms-2"></i>المحطات <i class="fas fa-chevron-down float-start"></i></a>
                    <ul id="stationsSub">
                        <li><a onclick="loadPage('addStation')">إضافة محطة</a></li>
                        <li><a onclick="loadPage('listStations')">عرض المحطات</a></li>
                    </ul>
                </li>
                <li>
                    <a onclick="toggleSubMenu('faultsSub')"><i class="fas fa-tools ms-2"></i>الأعطال <i class="fas fa-chevron-down float-start"></i></a>
                    <ul id="faultsSub">
                        <li><a onclick="loadPage('addFault')">بلاغ جديد</a></li>
                        <li><a onclick="loadPage('listFaults')">سجل الأعطال</a></li>
                    </ul>
                </li>
                <li><a onclick="logout()"><i class="fas fa-sign-out-alt ms-2"></i>تسجيل الخروج</a></li>
            </ul>
        </nav>

        <div id="content">
            <button id="toggleSidebar" class="btn btn-primary mb-3"><i class="fas fa-bars"></i></button>
            <div id="pageContent">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>

    <script>
        // دالة لفتح القوائم الفرعية
        function toggleSubMenu(id) {
            const menu = document.getElementById(id);
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        // تشغيل الصفحة الرئيسية عند التحميل
        window.onload = () => {
            if (typeof loadPage === 'function') {
                loadPage('home');
            }
        };
    </script>
</body>
</html>
