<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', sans-serif; background: #f0f2f5; }

        .wrapper { display: flex; width: 100%; min-height: 100vh; }

        #sidebar {
            width: 280px;
            background: #1e2a3e;
            color: white;
            transition: 0.3s;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        #sidebar.active { margin-right: -280px; }

        .sidebar-header {
            padding: 20px;
            background: #0d6efd;
            text-align: center;
        }

        #sidebar ul { list-style: none; padding: 20px 0; }

        #sidebar ul li a {
            padding: 12px 20px;
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            cursor: pointer;
        }

        #sidebar ul li a:hover { background: #0d6efd; }

        #sidebar ul ul li a {
            padding-right: 50px;
            background: #2c3e50;
        }

        #content { flex: 1; padding: 20px; }

        .btn-primary {
            background: #0d6efd;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
        }
    </style>
</head>

<body>

<div class="wrapper">

<!-- ==================== SIDEBAR ==================== -->
<nav id="sidebar">

    <div class="sidebar-header">
        <h4>محطات الصرف الصحي</h4>
        <small>بني مزار</small>
    </div>

    <ul>

        <li><a onclick="loadPage('home')"><i class="fas fa-home"></i> الرئيسية</a></li>

        <li>
            <a onclick="toggleSubMenu('stationMenu')"><i class="fas fa-water"></i> المحطات ▼</a>
            <ul id="stationMenu" style="display:none;">
                <li class="add-item"><a onclick="loadPage('addStation')">➕ إضافة محطة</a></li>
                <li><a onclick="loadPage('listStations')">📋 قائمة المحطات</a></li>
            </ul>
        </li>

        <li>
            <a onclick="toggleSubMenu('hrMenu')"><i class="fas fa-users"></i> الموارد البشرية ▼</a>
            <ul id="hrMenu" style="display:none;">
                <li class="add-item"><a onclick="loadPage('addEmployee')">➕ إضافة عامل</a></li>
                <li><a onclick="loadPage('listEmployees')">📋 قائمة العاملين</a></li>
            </ul>
        </li>

        <li>
            <a onclick="toggleSubMenu('maintenanceMenu')"><i class="fas fa-tools"></i> الصيانة ▼</a>
            <ul id="maintenanceMenu" style="display:none;">
                <li class="add-item"><a onclick="loadPage('addFault')">⚠️ بلاغ عطل</a></li>
                <li><a onclick="loadPage('listFaults')">📋 قائمة البلاغات</a></li>
            </ul>
        </li>

        <li>
            <a onclick="loadPage('archive')"><i class="fas fa-archive"></i> الأرشيف</a>
        </li>

        <li>
            <a onclick="loadPage('users')"><i class="fas fa-cog"></i> النظام</a>
        </li>

    </ul>

    <div style="padding:20px;">
        <button onclick="logout()" class="btn btn-danger w-100">تسجيل الخروج</button>
    </div>

</nav>

<!-- ==================== CONTENT ==================== -->
<div id="content">
    <button id="toggleSidebar" class="btn-primary">☰ القائمة</button>
    <div id="pageContent"></div>
</div>

</div>

<!-- ==================== SCRIPTS ==================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>

<script>
/* ==================== التحقق من تسجيل الدخول ==================== */
const loggedUser = JSON.parse(localStorage.getItem('loggedUser') || '{}');

if (!loggedUser.name) {
    window.location.href = 'index.html';
}

/* ==================== القائمة ==================== */
function toggleSubMenu(menuId) {
    const menu = document.getElementById(menuId);
    if (menu) {
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }
}

document.getElementById('toggleSidebar').onclick = function () {
    document.getElementById('sidebar').classList.toggle('active');
};

/* ==================== تسجيل الخروج ==================== */
function logout() {
    localStorage.removeItem('loggedUser');
    localStorage.removeItem('loginTime');
    window.location.href = 'index.html';
}

/* ==================== إخفاء الإضافة للمستخدم عرض فقط ==================== */
(function hideAddButtons() {
    if (loggedUser.role === 'عرض فقط') {
        document.querySelectorAll('.add-item').forEach(item => {
            item.style.display = 'none';
        });
    }
})();

/* ==================== تحميل الصفحة الرئيسية ==================== */
function initApp() {
    if (typeof loadPage === 'function') {
        loadPage('home');
    } else {
        setTimeout(initApp, 300);
    }
}
initApp();

</script>

</body>
</html>
