<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة محطات الصرف الصحي - بني مزار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tahoma', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a2b3e 0%, #0f3b4f 50%, #144d64 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة - أمواج */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(0,150,200,0.15)" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,181.3C672,181,768,203,864,208C960,213,1056,203,1152,186.7C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
            background-size: cover;
            animation: waveMove 12s linear infinite;
        }

        .bg-animation .wave2 {
            bottom: 60px;
            opacity: 0.5;
            animation: waveMove 8s linear infinite reverse;
        }

        @keyframes waveMove {
            0% { background-position-x: 0; }
            100% { background-position-x: 1440px; }
        }

        /* نقاط مائية متحركة */
        .bg-animation .drop {
            position: absolute;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 50%;
            animation: dropFall linear infinite;
        }

        @keyframes dropFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* بطاقة تسجيل الدخول */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .login-card {
            background: rgba(10, 40, 55, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            padding: 35px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 212, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(0, 212, 255, 0.4);
        }

        /* الشعار والعنوان */
        .header-logo {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 20px;
        }

        .header-logo i {
            font-size: 3rem;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.15);
            padding: 15px;
            border-radius: 50%;
            margin-bottom: 12px;
        }

        .header-logo h1 {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .company-name {
            color: #00d4ff;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 8px;
        }

        .branch-name {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .department-name {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-top: 3px;
        }

        /* حقول الإدخال */
        .form-group {
            margin-bottom: 22px;
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00d4ff;
            font-size: 1.1rem;
        }

        .input-icon input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 50px;
            font-size: 1rem;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-icon input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .input-icon input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* خيار تذكر البيانات */
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
        }

        .remember-checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #00d4ff;
        }

        /* زر تسجيل الدخول */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00a8cc, #0088aa);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #00b8e0, #0099c0);
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        /* رسائل الخطأ */
        .error-message {
            background: rgba(220, 53, 69, 0.2);
            border-right: 3px solid #dc3545;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #ff6b6b;
            font-size: 0.85rem;
            display: none;
        }

        /* التذييل */
        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
            padding-top: 20px;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            margin: 5px 0;
        }

        .footer .designer {
            color: #00d4ff;
            font-weight: 500;
        }

        .footer .manager-name,
        .footer .director-name {
            color: rgba(255, 255, 255, 0.8);
        }

        /* تحميل */
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-width: 500px) {
            .login-card {
                padding: 25px 20px;
            }
            .header-logo i {
                font-size: 2.5rem;
            }
            .header-logo h1 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="bg-animation">
    <div class="wave"></div>
    <div class="wave wave2"></div>
    <div id="drops-container"></div>
</div>

<div class="login-container">
    <div class="login-card">
        
        <!-- الشعار والعناوين -->
        <div class="header-logo">
            <i class="fas fa-tint"></i>
            <h1>شركة مياه الشرب والصرف الصحي</h1>
          <div class="company-name">المنيا</div>
            <div class="branch-name">فرع بني مزار</div>
            <div class="department-name">إدارة محطات الصرف الصحي</div>
        </div>

        <!-- رسالة الخطأ -->
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> 
            <span id="errorText">خطأ في اسم المستخدم أو كلمة المرور</span>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm">
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="username" name="username" placeholder="الكود الوظيفي" autocomplete="off" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="كلمة المرور" required>
                </div>
            </div>

            <div class="remember-row">
                <label class="remember-checkbox">
                    <input type="checkbox" id="rememberMe">
                    <span>تذكر بيانات الدخول</span>
                </label>
            </div>

            <button type="submit" id="loginBtn" class="login-btn">
                <i class="fas fa-sign-in-alt"></i>
                تسجيل الدخول
            </button>
        </form>

        <!-- التذييل -->
        <div class="footer">
            <p>تم إعداد وتصميم هذا النظام بمعرفة</p>
            <p class="designer">فني / كيرلس موريس يعقوب</p>
            <p class="manager-name">نائب مدير الفرع مهندس / منصور رجب عبدالله</p>
            <p class="director-name">مدير عام الفرع مهندسة / زينب أحمد عبدالمنعم</p>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    // إنشاء نقاط مائية متحركة
    function createDrops() {
        const container = document.getElementById('drops-container');
        for (let i = 0; i < 40; i++) {
            const drop = document.createElement('div');
            drop.className = 'drop';
            const size = Math.random() * 15 + 5;
            drop.style.width = size + 'px';
            drop.style.height = size + 'px';
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDuration = Math.random() * 8 + 4 + 's';
            drop.style.animationDelay = Math.random() * 10 + 's';
            container.appendChild(drop);
        }
    }
    createDrops();

    // تحميل البيانات المحفوظة
    function loadSavedCredentials() {
        const savedUsername = localStorage.getItem('saved_username');
        const savedPassword = localStorage.getItem('saved_password');
        const rememberMe = localStorage.getItem('remember_me') === 'true';
        
        if (rememberMe && savedUsername) {
            document.getElementById('username').value = savedUsername;
            document.getElementById('password').value = savedPassword || '';
            document.getElementById('rememberMe').checked = true;
        }
    }
   // معالجة تسجيل الدخول
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    
    if (!username || !password) {
        showError('الرجاء إدخال الكود الوظيفي وكلمة المرور');
        return;
    }
    
    // إظهار حالة التحميل
    const loginBtn = document.getElementById('loginBtn');
    const originalText = loginBtn.innerHTML;
    loginBtn.innerHTML = '<span class="loading"></span> جاري تسجيل الدخول...';
    loginBtn.disabled = true;
    
    try {
        // استخدام البريد الإلكتروني كاسم مستخدم (Supabase Auth يستخدم البريد)
        // يمكن تعديل هذا حسب هيكل قاعدة البيانات
        const result = await login(username, password);
        
        if (result.success) {
            // حفظ بيانات الدخول إذا تم اختيار تذكرني
            if (rememberMe) {
                localStorage.setItem('saved_username', username);
                localStorage.setItem('saved_password', password);
                localStorage.setItem('remember_me', 'true');
            } else {
                localStorage.removeItem('saved_username');
                localStorage.removeItem('saved_password');
                localStorage.setItem('remember_me', 'false');
            }
            
            // التوجيه إلى لوحة التحكم
            window.location.href = 'dashboard.html';
        } else {
            showError(result.message || 'اسم المستخدم أو كلمة المرور غير صحيحة');
            loginBtn.innerHTML = originalText;
            loginBtn.disabled = false;
        }
    } catch (error) {
        console.error('Login error:', error);
        showError('حدث خطأ في الاتصال بالخادم، الرجاء المحاولة لاحقاً');
        loginBtn.innerHTML = originalText;
        loginBtn.disabled = false;
    }
});    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorDiv.style.display = 'block';
        
        // إخفاء الخطأ بعد 5 ثوانٍ
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }
    
    // عند الضغط على Enter
    document.getElementById('password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    });
</script>

</body>
</html>
