<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة محطات الصرف الصحي - بني مزار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #0a2b3e, #0f3b4f, #144d64);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container { max-width: 480px; width: 100%; padding: 20px; }
        .login-card {
            background: rgba(10,40,55,0.85);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            padding: 35px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .header-logo { text-align: center; margin-bottom: 25px; }
        .header-logo i { font-size: 3rem; color: #00d4ff; margin-bottom: 12px; }
        .company-name { color: #00d4ff; font-weight: bold; font-size: 1.1rem; }
        .branch-name, .department-name { color: rgba(255,255,255,0.8); font-size: 0.9rem; margin-top: 5px; }
        .form-group { margin-bottom: 22px; }
        .input-icon { position: relative; }
        .input-icon i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00d4ff;
        }
        .input-icon input {
            width: 100%;
            padding: 14px 45px 14px 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 50px;
            color: #fff;
        }
        .remember-row { display: flex; justify-content: space-between; margin-bottom: 25px; color: rgba(255,255,255,0.7); }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00a8cc, #0088aa);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .error-message {
            background: rgba(220,53,69,0.2);
            border-right: 3px solid #dc3545;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #ff6b6b;
            display: none;
        }
        .footer { text-align: center; margin-top: 30px; border-top: 1px solid rgba(0,212,255,0.2); padding-top: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.6); }
        .designer { color: #00d4ff; }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="header-logo">
            <i class="fas fa-tint"></i>
            <div class="company-name">شركة مياه الشرب والصرف الصحي</div>
            <div class="branch-name">المنيا - فرع بني مزار</div>
            <div class="department-name">إدارة محطات الصرف الصحي</div>
        </div>

        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="username" placeholder="الكود الوظيفي" required>
                </div>
            </div>
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="كلمة المرور" required>
                </div>
            </div>
            <div class="remember-row">
                <label><input type="checkbox" id="rememberMe"> تذكر بيانات الدخول</label>
            </div>
            <button type="submit" id="loginBtn" class="login-btn">تسجيل الدخول</button>
        </form>

        <div class="footer">
            <p>تم إعداد وتصميم هذا النظام بمعرفة</p>
            <p class="designer">فني / كيرلس موريس يعقوب</p>
            <p>نائب مدير الفرع: مهندس / منصور رجب عبدالله</p>
            <p>مدير عام الفرع: مهندسة / زينب أحمد عبدالمنعم</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/api.js"></script>
<script>
    function loadSavedCredentials() {
        const savedUsername = localStorage.getItem('saved_username');
        const savedPassword = localStorage.getItem('saved_password');
        const rememberMe = localStorage.getItem('remember_me') === 'true';
        if (rememberMe && savedUsername) {
            document.getElementById('username').value = savedUsername;
            document.getElementById('password').value = savedPassword || '';
            document.getElementById('rememberMe').checked = true;
        }
    }
    loadSavedCredentials();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;
        
        if (!username || !password) {
            showError('الرجاء إدخال الكود الوظيفي وكلمة المرور');
            return;
        }
        
        const btn = document.getElementById('loginBtn');
        const original = btn.innerHTML;
        btn.innerHTML = '<span class="loading"></span> جاري تسجيل الدخول...';
        btn.disabled = true;
        
        try {
            const result = await login(username, password);
            if (result.success) {
                if (rememberMe) {
                    localStorage.setItem('saved_username', username);
                    localStorage.setItem('saved_password', password);
                    localStorage.setItem('remember_me', 'true');
                } else {
                    localStorage.removeItem('saved_username');
                    localStorage.removeItem('saved_password');
                    localStorage.setItem('remember_me', 'false');
                }
                window.location.href = 'dashboard.html';
            } else {
                showError(result.message);
                btn.innerHTML = original;
                btn.disabled = false;
            }
        } catch (error) {
            console.error('Login error:', error);
            showError('حدث خطأ في الاتصال بالخادم');
            btn.innerHTML = original;
            btn.disabled = false;
        }
    });
    
    function showError(msg) {
        const div = document.getElementById('errorMessage');
        document.getElementById('errorText').innerText = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 5000);
    }
    <script src="https://kerlosmores2-rgb.github.io/banimazar/client/js/api.js"></script>
<script>
    console.log("فحص api.js:", typeof login);
    if (typeof login === 'undefined') {
        console.error("❌ api.js لم يتم تحميله!");
    } else {
        console.log("✅ api.js تم تحميله");
    }
</script>
</body>
</html>
