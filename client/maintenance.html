<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة بلاغات الصيانة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-danger { background: #dc3545; color: #fff; }
        
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #164a63; padding: 15px; border-radius: 10px; flex: 1; text-align: center; border-bottom: 4px solid #00d4ff; }
        
        #searchInput { width: 100%; max-width: 400px; padding: 10px; border-radius: 20px; border: 1px solid #00d4ff; background: #fff; color: #000; margin: 15px 0; }

        .data-table { width: 100%; border-collapse: collapse; background: #164a63; border-radius: 10px; overflow: hidden; }
        .data-table th, .data-table td { padding: 12px; border-bottom: 1px solid #ffffff22; text-align: center; }
        .data-table th { background: #00d4ff33; color: #00d4ff; }
        
        /* تلوين الحالة */
        .status-pending { color: #ffc107; } /* أصفر */
        .status-working { color: #00d4ff; } /* أزرق */
        .status-done { color: #28a745; }    /* أخضر */

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1e2a3a; padding: 20px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #2c3e50; color: white; box-sizing: border-box; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <h2>🛠️ نظام بلاغات الصيانة</h2>

    <div class="dashboard">
        <div class="stat-card">الكل: <span id="totalTickets">0</span></div>
        <div class="stat-card" style="border-color: #ffc107;">انتظار: <span id="pendingTickets">0</span></div>
        <div class="stat-card" style="border-color: #28a745;">تم الإصلاح: <span id="doneTickets">0</span></div>
    </div>

    <button class="btn btn-primary" id="addTicketBtn">➕ تسجيل بلاغ جديد</button>
    <input type="text" id="searchInput" placeholder="🔍 ابحث برقم البلاغ، المحطة، أو الموظف...">

    <div id="ticketsList">جاري تحميل البلاغات...</div>

    <div id="ticketModal" class="modal">
        <div class="modal-content">
            <h3>📝 تفاصيل بلاغ الصيانة</h3>
            <form id="ticketForm">
                <input type="hidden" id="ticketId">
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex:1">
                        <label>المحطة:</label>
                        <select id="ticketStation" required onchange="filterAssetsByStation()"></select>
                    </div>
                    <div style="flex:1">
                        <label>الأصل (المعدة):</label>
                        <select id="ticketAsset" required></select>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex:1">
                        <label>نوع العطل:</label>
                        <select id="faultType">
                            <option value="كهرباء">كهرباء</option>
                            <option value="ميكانيكا">ميكانيكا</option>
                        </select>
                    </div>
                    <div style="flex:1">
                        <label>الموظف المسؤول:</label>
                        <select id="ticketEmployee" required></select>
                    </div>
                </div>

                <label>وصف العطل:</label>
                <textarea id="faultDesc" rows="2"></textarea>

                <label>إجراءات الإصلاح:</label>
                <textarea id="repairActions" rows="2"></textarea>

                <label>قطع الغيار المستخدمة:</label>
                <input id="spareParts" placeholder="مثلاً: بلي 6205، زيت، سيور...">

                <label>حالة البلاغ:</label>
                <select id="ticketStatus">
                    <option value="قيد الانتظار">قيد الانتظار</option>
                    <option value="جاري العمل">جاري العمل</option>
                    <option value="تم الإصلاح">تم الإصلاح</option>
                </select>

                <div style="text-align: left; margin-top: 15px;">
                    <button type="submit" class="btn btn-success">حفظ البلاغ</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient(
            'https://jvfbkoaeugkeoiccvnkq.supabase.co',
            'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ'
        );

        let allTickets = [];
        let allAssets = [];

        async function init() {
            await Promise.all([loadStations(), loadEmployees(), loadAssets(), loadTickets()]);
        }

        async function loadStations() {
            const { data } = await supabaseClient.from('stations').select('*');
            const select = document.getElementById('ticketStation');
            select.innerHTML = '<option value="" disabled selected>اختر المحطة...</option>';
            data.forEach(s => select.innerHTML += `<option value="${s.station_name}">${s.station_name}</option>`);
        }

        async function loadEmployees() {
            const { data } = await supabaseClient.from('employees').select('employee_name');
            const select = document.getElementById('ticketEmployee');
            select.innerHTML = '<option value="" disabled selected>اختر الموظف...</option>';
            data.forEach(e => select.innerHTML += `<option value="${e.employee_name}">${e.employee_name}</option>`);
        }

        async function loadAssets() {
            const { data } = await supabaseClient.from('assets').select('*');
            allAssets = data || [];
        }

        window.filterAssetsByStation = () => {
            const station = document.getElementById('ticketStation').value;
            const assetSelect = document.getElementById('ticketAsset');
            assetSelect.innerHTML = '<option value="" disabled selected>اختر المعدة...</option>';
            allAssets.filter(a => a.station_name === station).forEach(a => {
                assetSelect.innerHTML += `<option value="${a.asset_name}">${a.asset_name}</option>`;
            });
        };

        async function loadTickets() {
            const { data } = await supabaseClient.from('maintenance_tickets').select('*').order('created_at', { ascending: false });
            allTickets = data || [];
            updateStats();
            renderTickets(allTickets);
        }

        function updateStats() {
            document.getElementById('totalTickets').innerText = allTickets.length;
            document.getElementById('pendingTickets').innerText = allTickets.filter(t => t.status === 'قيد الانتظار').length;
            document.getElementById('doneTickets').innerText = allTickets.filter(t => t.status === 'تم الإصلاح').length;
        }

        function renderTickets(data) {
            let html = `<table class="data-table">
                <tr><th>التاريخ</th><th>المحطة</th><th>الأصل</th><th>الموظف</th><th>الحالة</th><th>إجراءات</th></tr>`;
            data.forEach(t => {
                let statusClass = t.status === 'تم الإصلاح' ? 'status-done' : (t.status === 'جاري العمل' ? 'status-working' : 'status-pending');
                html += `<tr>
                    <td>${new Date(t.created_at).toLocaleDateString('ar-EG')}</td>
                    <td>${t.station_name}</td>
                    <td>${t.asset_name}</td>
                    <td>${t.employee_name}</td>
                    <td class="${statusClass}">● ${t.status}</td>
                    <td><button class="btn" style="background:#ffc107" onclick="editTicket(${t.id})">تعديل</button></td>
                </tr>`;
            });
            document.getElementById('ticketsList').innerHTML = html + '</table>';
        }

        // بحث
        document.getElementById('searchInput').oninput = function() {
            const val = this.value.toLowerCase();
            const filtered = allTickets.filter(t => 
                t.station_name.toLowerCase().includes(val) || 
                t.employee_name.toLowerCase().includes(val) || 
                t.asset_name.toLowerCase().includes(val)
            );
            renderTickets(filtered);
        };

        // حفظ البلاغ
        document.getElementById('ticketForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('ticketId').value;
            const formData = {
                station_name: document.getElementById('ticketStation').value,
                asset_name: document.getElementById('ticketAsset').value,
                fault_type: document.getElementById('faultType').value,
                employee_name: document.getElementById('ticketEmployee').value,
                fault_description: document.getElementById('faultDesc').value,
                repair_actions: document.getElementById('repairActions').value,
                spare_parts: document.getElementById('spareParts').value,
                status: document.getElementById('ticketStatus').value
            };

            if (id) await supabaseClient.from('maintenance_tickets').update(formData).eq('id', id);
            else await supabaseClient.from('maintenance_tickets').insert([formData]);

            closeModal();
            loadTickets();
        };

        document.getElementById('addTicketBtn').onclick = () => {
            document.getElementById('ticketForm').reset();
            document.getElementById('ticketId').value = '';
            document.getElementById('ticketModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('ticketModal').classList.remove('active');

        init();
    </script>
</body>
</html>
