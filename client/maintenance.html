<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام بلاغات الصيانة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-warning { background: #ffc107; color: #000; }

        /* لوحة التحكم (Dashboard) */
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #164a63; padding: 15px; border-radius: 10px; flex: 1; min-width: 120px; text-align: center; border-bottom: 4px solid #00d4ff; }
        .stat-card span { display: block; font-size: 24px; font-weight: bold; margin-top: 5px; }

        /* حقل البحث (نفس ستايل الموظفين) */
        #searchInput { 
            width: 100%; max-width: 500px; padding: 12px 20px; 
            border-radius: 30px; border: 2px solid #00d4ff; 
            background: #ffffff; color: #000; font-size: 16px;
            margin: 20px 0; outline: none; display: block;
        }

        .data-table { width: 100%; border-collapse: collapse; background: #164a63; border-radius: 10px; overflow: hidden; }
        .data-table th, .data-table td { padding: 12px; border-bottom: 1px solid #ffffff22; text-align: center; }
        .data-table th { background: #00d4ff33; color: #00d4ff; }
        
        /* تلوين الحالات */
        .status-pending { color: #ffc107; font-weight: bold; }
        .status-working { color: #00d4ff; font-weight: bold; }
        .status-done { color: #2ecc71; font-weight: bold; }

        /* المودال */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1e2a3a; padding: 25px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #2c3e50; color: white; box-sizing: border-box; font-family: 'Cairo'; }
        label { display: block; margin-bottom: 5px; color: #00d4ff; font-size: 14px; }
    </style>
</head>
<body>

    <h2>🛠️ إدارة بلاغات الصيانة</h2>

    <div class="dashboard">
        <div class="stat-card">إجمالي البلاغات <span id="countTotal">0</span></div>
        <div class="stat-card" style="border-color: #ffc107;">قيد الانتظار <span id="countPending">0</span></div>
        <div class="stat-card" style="border-color: #00d4ff;">جاري العمل <span id="countWorking">0</span></div>
        <div class="stat-card" style="border-color: #28a745;">تم الإصلاح <span id="countDone">0</span></div>
    </div>

    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="btn btn-primary" id="addTicketBtn">➕ تسجيل بلاغ جديد</button>
    </div>

    <input type="text" id="searchInput" placeholder="🔍 ابحث بالمحطة، المعدة، الموظف، أو الحالة...">

    <div id="ticketsList">جاري تحميل البيانات...</div>

    <div id="ticketModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">تفاصيل البلاغ</h3>
            <form id="ticketForm">
                <input type="hidden" id="ticketId">
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex:1">
                        <label>المحطة:</label>
                        <select id="ticketStation" required onchange="updateAssetsList()"></select>
                    </div>
                    <div style="flex:1">
                        <label>الأصل (المعدة):</label>
                        <select id="ticketAsset" required>
                            <option value="">اختر المحطة أولاً</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div style="flex:1">
                        <label>نوع العطل:</label>
                        <select id="faultType">
                            <option value="كهرباء">كهرباء</option>
                            <option value="ميكانيكا">ميكانيكا</option>
                        </select>
                    </div>
                    <div style="flex:1">
                        <label>الموظف المسؤول:</label>
                        <select id="ticketEmployee" required></select>
                    </div>
                </div>

                <label>وصف العطل:</label>
                <textarea id="faultDesc" rows="2" placeholder="اشرح المشكلة..."></textarea>

                <label>إجراءات الإصلاح:</label>
                <textarea id="repairActions" rows="2" placeholder="ماذا تم للإصلاح؟"></textarea>

                <label>قطع الغيار:</label>
                <input id="spareParts" placeholder="قطع الغيار المستخدمة">

                <label>حالة البلاغ:</label>
                <select id="ticketStatus">
                    <option value="قيد الانتظار">قيد الانتظار</option>
                    <option value="جاري العمل">جاري العمل</option>
                    <option value="تم الإصلاح">تم الإصلاح</option>
                </select>

                <div style="text-align: left; margin-top: 10px;">
                    <button type="submit" class="btn btn-success">حفظ البيانات</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const supabaseClient = supabase.createClient(
                'https://jvfbkoaeugkeoiccvnkq.supabase.co',
                'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ'
            );

            let ticketsData = [];
            let assetsData = [];
            let currentEditId = null;

            // 1. تحميل البيانات الأساسية للقوائم المنسدلة
            async function loadDropdowns() {
                // جلب المحطات
                const resStations = await supabaseClient.from('stations').select('station_name');
                const stationSelect = document.getElementById('ticketStation');
                stationSelect.innerHTML = '<option value="" disabled selected>اختر المحطة</option>';
                resStations.data?.forEach(s => stationSelect.innerHTML += `<option value="${s.station_name}">${s.station_name}</option>`);

                // جلب الموظفين
                const resEmployees = await supabaseClient.from('employees').select('employee_name');
                const empSelect = document.getElementById('ticketEmployee');
                empSelect.innerHTML = '<option value="" disabled selected>اختر الموظف</option>';
                resEmployees.data?.forEach(e => empSelect.innerHTML += `<option value="${e.employee_name}">${e.employee_name}</option>`);

                // جلب الأصول (المعدات) وتخزينها محلياً للفلترة
                const resAssets = await supabaseClient.from('assets').select('*');
                assetsData = resAssets.data || [];
            }

            // تحديث قائمة المعدات بناءً على المحطة المختارة
            window.updateAssetsList = () => {
                const selectedStation = document.getElementById('ticketStation').value;
                const assetSelect = document.getElementById('ticketAsset');
                assetSelect.innerHTML = '<option value="" disabled selected>اختر المعدة</option>';
                
                assetsData.filter(a => a.station_name === selectedStation).forEach(a => {
                    assetSelect.innerHTML += `<option value="${a.asset_name}">${a.asset_name}</option>`;
                });
            };

            // 2. جلب ورسم البلاغات
            async function loadTickets() {
                const { data, error } = await supabaseClient.from('maintenance_tickets').select('*').order('created_at', { ascending: false });
                if (error) return;
                ticketsData = data || [];
                updateDashboard();
                renderTable(ticketsData);
            }

            function updateDashboard() {
                document.getElementById('countTotal').innerText = ticketsData.length;
                document.getElementById('countPending').innerText = ticketsData.filter(t => t.status === 'قيد الانتظار').length;
                document.getElementById('countWorking').innerText = ticketsData.filter(t => t.status === 'جاري العمل').length;
                document.getElementById('countDone').innerText = ticketsData.filter(t => t.status === 'تم الإصلاح').length;
            }

            function renderTable(data) {
                const listDiv = document.getElementById('ticketsList');
                if (!data.length) { listDiv.innerHTML = '<p style="text-align:center; padding:20px;">لا توجد بلاغات مسجلة</p>'; return; }

                let html = `<table class="data-table">
                    <tr><th>التاريخ</th><th>المحطة</th><th>المعدة</th><th>الموظف</th><th>الحالة</th><th>الإجراءات</th></tr>`;
                
                data.forEach(t => {
                    let sClass = t.status === 'تم الإصلاح' ? 'status-done' : (t.status === 'جاري العمل' ? 'status-working' : 'status-pending');
                    let showDoneBtn = t.status !== 'تم الإصلاح';

                    html += `<tr style="${t.status === 'تم الإصلاح' ? 'opacity: 0.7' : ''}">
                        <td>${new Date(t.created_at).toLocaleDateString('ar-EG')}</td>
                        <td>${t.station_name}</td>
                        <td>${t.asset_name}</td>
                        <td>${t.employee_name}</td>
                        <td class="${sClass}">${t.status}</td>
                        <td>
                            ${showDoneBtn ? `<button class="btn btn-success" onclick="quickDone(${t.id})" title="قفل البلاغ"><i class="fas fa-check"></i></button>` : ''}
                            <button class="btn btn-warning" onclick="editTicket(${t.id})"><i class="fas fa-edit"></i></button>
                        </td>
                    </tr>`;
                });
                listDiv.innerHTML = html + '</table>';
            }

            // 3. وظائف البحث والفلترة
            document.getElementById('searchInput').oninput = function() {
                const val = this.value.toLowerCase();
                const filtered = ticketsData.filter(t => 
                    t.station_name?.toLowerCase().includes(val) || 
                    t.employee_name?.toLowerCase().includes(val) || 
                    t.asset_name?.toLowerCase().includes(val) ||
                    t.status?.toLowerCase().includes(val)
                );
                renderTable(filtered);
            };

            // 4. العمليات (إضافة/تعديل/قفل)
            document.getElementById('addTicketBtn').onclick = () => {
                currentEditId = null;
                document.getElementById('ticketForm').reset();
                document.getElementById('modalTitle').innerText = "تسجيل بلاغ جديد";
                document.getElementById('ticketModal').classList.add('active');
            };

            window.editTicket = (id) => {
                const t = ticketsData.find(x => x.id == id);
                if (!t) return;
                currentEditId = id;
                document.getElementById('modalTitle').innerText = "تعديل البلاغ";
                document.getElementById('ticketStation').value = t.station_name;
                updateAssetsList(); // لتعبئة قائمة المعدات فوراً
                document.getElementById('ticketAsset').value = t.asset_name;
                document.getElementById('faultType').value = t.fault_type;
                document.getElementById('ticketEmployee').value = t.employee_name;
                document.getElementById('faultDesc').value = t.fault_description;
                document.getElementById('repairActions').value = t.repair_actions;
                document.getElementById('spareParts').value = t.spare_parts;
                document.getElementById('ticketStatus').value = t.status;
                document.getElementById('ticketModal').classList.add('active');
            };

            window.quickDone = async (id) => {
                if(!confirm('هل تم الإصلاح فعلاً وتريد قفل البلاغ؟')) return;
                await supabaseClient.from('maintenance_tickets').update({ status: 'تم الإصلاح' }).eq('id', id);
                loadTickets();
            };

            document.getElementById('ticketForm').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    station_name: document.getElementById('ticketStation').value,
                    asset_name: document.getElementById('ticketAsset').value,
                    fault_type: document.getElementById('faultType').value,
                    employee_name: document.getElementById('ticketEmployee').value,
                    fault_description: document.getElementById('faultDesc').value,
                    repair_actions: document.getElementById('repairActions').value,
                    spare_parts: document.getElementById('spareParts').value,
                    status: document.getElementById('ticketStatus').value
                };

                if (currentEditId) await supabaseClient.from('maintenance_tickets').update(data).eq('id', currentEditId);
                else await supabaseClient.from('maintenance_tickets').insert([data]);

                closeModal();
                loadTickets();
            };

            window.closeModal = () => document.getElementById('ticketModal').classList.remove('active');

            // بدء التشغيل
            loadDropdowns();
            loadTickets();
        });
    </script>
</body>
</html>
