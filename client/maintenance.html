<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام بلاغات الصيانة - الربط المتعدد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* التنسيق الجمالي المتوافق مع تطبيقك */
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-danger { background: #dc3545; color: #fff; }
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #164a63; padding: 15px; border-radius: 10px; flex: 1; text-align: center; border-bottom: 4px solid #00d4ff; }
        .data-table { width: 100%; border-collapse: collapse; background: #164a63; border-radius: 10px; overflow: hidden; }
        .data-table th, .data-table td { padding: 12px; border-bottom: 1px solid #ffffff22; text-align: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1e2a3a; padding: 25px; border-radius: 15px; width: 90%; max-width: 600px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #2c3e50; color: white; }
        label { color: #00d4ff; font-size: 14px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>🛠️ إدارة بلاغات الصيانة (نظام الربط الموحد)</h2>

    <div class="dashboard">
        <div class="stat-card">إجمالي البلاغات <span id="countTotal">0</span></div>
        <div class="stat-card">قيد الانتظار <span id="countPending">0</span></div>
    </div>

    <button class="btn btn-primary" id="addTicketBtn">➕ تسجيل بلاغ جديد</button>
    <div id="ticketsList">جاري تحميل البلاغات...</div>

    <div id="ticketModal" class="modal">
        <div class="modal-content">
            <h3>تسجيل بلاغ صيانة</h3>
            <form id="ticketForm">
                <label>1. اختر المحطة:</label>
                <select id="ticketStation" required onchange="updateRelatedData()"></select>
                
                <label>2. اختر المعدة (الأصل):</label>
                <select id="ticketAsset" required><option value="">اختر المحطة أولاً</option></select>
                
                <label>3. الموظف المبلغ:</label>
                <select id="ticketEmployee" required><option value="">اختر المحطة أولاً</option></select>

                <label>وصف العطل:</label>
                <textarea id="faultDesc" rows="2" placeholder="ما هي المشكلة؟"></textarea>

                <button type="submit" class="btn btn-success">حفظ البلاغ</button>
                <button type="button" class="btn btn-danger" onclick="closeModal()">إغاء</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient(
            'https://jvfbkoaeugkeoiccvnkq.supabase.co',
            'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ'
        );

        let allAssets = [];
        let allEmployees = [];
        let ticketsData = [];

        // 1. جلب البيانات من كل الجداول عند فتح الصفحة
        async function loadInitialData() {
            // جلب المحطات
            const { data: stations } = await supabaseClient.from('stations').select('id, station_name');
            const stationSelect = document.getElementById('ticketStation');
            stationSelect.innerHTML = '<option value="" disabled selected>اختر المحطة</option>';
            stations?.forEach(s => stationSelect.innerHTML += `<option value="${s.id}">${s.station_name}</option>`);

            // جلب الأصول من الـ 7 جداول ودمجها
            const tables = ['transformers', 'generators', 'electrical_panels', 'main_pumps', 'sub_pumps', 'other_assets', 'buildings'];
            allAssets = [];
            
            const results = await Promise.all(tables.map(t => supabaseClient.from(t).select('*')));
            results.forEach(res => {
                res.data?.forEach(item => {
                    let name = item.asset_name || item.transformer_number || item.generator_number || 
                               item.panel_name || item.pump_number || item.building_name || "أصل غير مسمى";
                    allAssets.push({ name: name, station_id: item.station_id });
                });
            });

            // جلب الموظفين
            const { data: emps } = await supabaseClient.from('employees').select('employee_name, station_id');
            allEmployees = emps || [];

            loadTickets();
        }

        // 2. الفلترة الذكية (هنا مربط الفرس)
        window.updateRelatedData = () => {
            const selectedId = document.getElementById('ticketStation').value;
            
            // فلترة الأصول
            const assetSelect = document.getElementById('ticketAsset');
            assetSelect.innerHTML = '<option value="" disabled selected>اختر المعدة</option>';
            allAssets.filter(a => String(a.station_id) === String(selectedId)).forEach(a => {
                assetSelect.innerHTML += `<option value="${a.name}">${a.name}</option>`;
            });

            // فلترة الموظفين
            const empSelect = document.getElementById('ticketEmployee');
            empSelect.innerHTML = '<option value="" disabled selected>اختر الموظف</option>';
            allEmployees.filter(e => String(e.station_id) === String(selectedId)).forEach(e => {
                empSelect.innerHTML += `<option value="${e.employee_name}">${e.employee_name}</option>`;
            });
        };

        // 3. إدارة البلاغات (جلب وعرض)
        async function loadTickets() {
            const { data } = await supabaseClient.from('maintenance_tickets').select('*').order('created_at', { ascending: false });
            ticketsData = data || [];
            renderTable();
        }

        function renderTable() {
            let html = `<table class="data-table"><tr><th>التاريخ</th><th>المحطة</th><th>المعدة</th><th>الموظف</th><th>الحالة</th></tr>`;
            ticketsData.forEach(t => {
                html += `<tr>
                    <td>${new Date(t.created_at).toLocaleDateString('ar-EG')}</td>
                    <td>${t.station_name || '---'}</td>
                    <td>${t.asset_name}</td>
                    <td>${t.employee_name}</td>
                    <td>${t.status}</td>
                </tr>`;
            });
            document.getElementById('ticketsList').innerHTML = html + '</table>';
            document.getElementById('countTotal').innerText = ticketsData.length;
        }

        // فتح وإغلاق المودال
        document.getElementById('addTicketBtn').onclick = () => document.getElementById('ticketModal').classList.add('active');
        window.closeModal = () => document.getElementById('ticketModal').classList.remove('active');

        // حفظ البلاغ
        document.getElementById('ticketForm').onsubmit = async (e) => {
            e.preventDefault();
            const stationElement = document.getElementById('ticketStation');
            const data = {
                station_id: stationElement.value,
                station_name: stationElement.options[stationElement.selectedIndex].text,
                asset_name: document.getElementById('ticketAsset').value,
                employee_name: document.getElementById('ticketEmployee').value,
                fault_description: document.getElementById('faultDesc').value,
                status: 'قيد الانتظار'
            };
            await supabaseClient.from('maintenance_tickets').insert([data]);
            closeModal();
            loadTickets();
        };

        loadInitialData();
    </script>
</body>
</html>
