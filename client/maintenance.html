<script>
    document.addEventListener("DOMContentLoaded", () => {
        const supabaseClient = supabase.createClient(
            'https://jvfbkoaeugkeoiccvnkq.supabase.co',
            'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ'
        );

        let ticketsData = [];
        let allAssets = [];    // مخزن لكل الأصول
        let allEmployees = []; // مخزن لكل الموظفين

        // 1. تحميل كل البيانات الأساسية مرة واحدة عند الفتح
        async function loadInitialData() {
            // جلب المحطات
            const resStations = await supabaseClient.from('stations').select('station_name');
            const stationSelect = document.getElementById('ticketStation');
            stationSelect.innerHTML = '<option value="" disabled selected>اختر المحطة</option>';
            resStations.data?.forEach(s => stationSelect.innerHTML += `<option value="${s.station_name}">${s.station_name}</option>`);

            // جلب كل الأصول وتخزينها
            const resAssets = await supabaseClient.from('assets').select('*');
            allAssets = resAssets.data || [];

            // جلب كل الموظفين وتخزينها
            const resEmployees = await supabaseClient.from('employees').select('employee_name, station');
            allEmployees = resEmployees.data || [];

            loadTickets(); // تحميل الجدول الرئيسي
        }

        // 2. الوظيفة السحرية: تحديث الأصول والموظفين بناءً على المحطة المختارة
        window.updateRelatedData = () => {
            const selectedStation = document.getElementById('ticketStation').value;
            
            // فلترة وتعبئة الأصول
            const assetSelect = document.getElementById('ticketAsset');
            assetSelect.innerHTML = '<option value="" disabled selected>اختر المعدة...</option>';
            const filteredAssets = allAssets.filter(a => a.station_name === selectedStation);
            
            if(filteredAssets.length > 0) {
                filteredAssets.forEach(a => assetSelect.innerHTML += `<option value="${a.asset_name}">${a.asset_name}</option>`);
            } else {
                assetSelect.innerHTML = '<option value="">لا توجد أصول مسجلة لهذه المحطة</option>';
            }

            // فلترة وتعبئة الموظفين (المسجلين على هذه المحطة فقط)
            const empSelect = document.getElementById('ticketEmployee');
            empSelect.innerHTML = '<option value="" disabled selected>اختر الموظف...</option>';
            const filteredEmps = allEmployees.filter(e => e.station === selectedStation);

            if(filteredEmps.length > 0) {
                filteredEmps.forEach(e => empSelect.innerHTML += `<option value="${e.employee_name}">${e.employee_name}</option>`);
            } else {
                empSelect.innerHTML = '<option value="">لا يوجد موظفين مسجلين لهذه المحطة</option>';
            }
        };

        // تعديل في HTML المودال (تأكد أن الـ Select الخاص بالمحطة يستدعي الدالة الجديدة)
        // <select id="ticketStation" required onchange="updateRelatedData()"></select>

        // باقي وظائف الجدول (loadTickets, renderTable, quickDone) كما هي في الكود السابق...
        // [ملاحظة: تأكد من نسخ باقي وظائف الحفظ والبحث من الكود السابق]
        
        async function loadTickets() {
            const { data, error } = await supabaseClient.from('maintenance_tickets').select('*').order('created_at', { ascending: false });
            if (!error) {
                ticketsData = data || [];
                renderTable(ticketsData);
                updateDashboard();
            }
        }

        // ... (بقية الأكواد البرمجية للحفظ والمسح) ...
        loadInitialData();
    });
</script>
