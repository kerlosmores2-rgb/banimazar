<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام إدارة محطات بني مزار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0a2b3e;
            --bg-dark: #061621;
            --card-bg: rgba(255, 255, 255, 0.05);
            --sidebar-width: 280px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; overflow-x: hidden; }

        /* القائمة الجانبية */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--secondary);
            position: fixed;
            right: 0; top: 0;
            z-index: 1000;
            transition: var(--transition);
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .sidebar.collapsed { right: calc(-1 * var(--sidebar-width)); }

        .sidebar-header {
            padding: 25px;
            text-align: center;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-group-title {
            padding: 15px 25px 5px;
            font-size: 0.7rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item {
            display: flex; align-items: center;
            padding: 12px 25px;
            color: #bdc3c7;
            text-decoration: none;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 212, 255, 0.1);
            color: #fff;
            border-right: 4px solid var(--primary);
        }

        /* المحتوى الرئيسي */
        .main-wrapper {
            margin-right: var(--sidebar-width);
            transition: var(--transition);
        }
        .main-wrapper.full { margin-right: 0; }

        header {
            height: 70px;
            background: rgba(10, 43, 62, 0.9);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px;
            position: sticky; top: 0; z-index: 999;
        }

        .toggle-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }

        .content-area { padding: 25px; }

        /* جداول البيانات */
        .data-table {
            width: 100%; border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 15px; overflow: hidden;
            margin-top: 20px;
        }
        .data-table th { background: rgba(0, 212, 255, 0.2); padding: 15px; text-align: right; }
        .data-table td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        .status-active { background: #27ae60; }
        .status-maintenance { background: #e67e22; }

        @media (max-width: 768px) {
            .sidebar { right: -280px; }
            .sidebar.mobile-open { right: 0; }
            .main-wrapper { margin-right: 0; }
        }
    </style>
</head>
<body>

<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3 style="color: var(--primary);">نظام إدارة المحطات</h3>
    </div>
    
    <div class="nav-item active" onclick="loadPage('dashboard')">
        <i class="fas fa-chart-pie"></i> الرئيسية
    </div>

    <div class="nav-group-title">المحطات والأصول</div>
    <div class="nav-item" onclick="loadPage('stations')"><i class="fas fa-industry"></i> المحطات</div>
    <div class="nav-item" onclick="loadPage('assets')"><i class="fas fa-tools"></i> الأصول</div>

    <div class="nav-group-title">الصيانة</div>
    <div class="nav-item" onclick="loadPage('maintenance')"><i class="fas fa-exclamation-triangle"></i> بلاغات الصيانة</div>
    <div class="nav-item" onclick="loadPage('inspection')"><i class="fas fa-clipboard-list"></i> تقارير المرور</div>

    <div class="nav-group-title">التقارير والكهرباء</div>
    <div class="nav-item" onclick="loadPage('reports')"><i class="fas fa-file-invoice"></i> التقارير الشهرية</div>
    <div class="nav-item" onclick="loadPage('pf_panels')"><i class="fas fa-bolt"></i> لوحات معامل القدرة</div>

    <div class="nav-group-title">الموظفين</div>
    <div class="nav-item" onclick="loadPage('employees')"><i class="fas fa-users"></i> شؤون الموظفين</div>
</nav>

<div class="main-wrapper" id="mainWrapper">
    <header>
        <button class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div id="pageTitle">الرئيسية</div>
        <div>م/ إبراهيم</div>
    </header>

    <main class="content-area" id="pageContent">
        </main>
</div>

<script>
    // بيانات الربط الخاصة بك (من ملفك الأصلي)
    const supabaseUrl = 'https://paozltmhzmcrvclpuvsn.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // سيتم استخدام مفتاحك من الملف المرفق
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        if(window.innerWidth > 768) {
            sb.classList.toggle('collapsed');
            document.getElementById('mainWrapper').classList.toggle('full');
        } else {
            sb.classList.toggle('mobile-open');
        }
    }

    async function loadPage(page) {
        const content = document.getElementById('pageContent');
        const title = document.getElementById('pageTitle');
        
        content.innerHTML = '<div style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-spin fa-2x"></i> جاري التحميل...</div>';

        try {
            if (page === 'dashboard') {
                title.innerText = "لوحة التحكم الرئيسية";
                renderDashboard();
            } else if (page === 'stations') {
                title.innerText = "إدارة المحطات";
                const { data } = await _supabase.from('stations').select('*');
                renderStations(data);
            } else if (page === 'pf_panels') {
                title.innerText = "لوحات معامل القدرة";
                const { data } = await _supabase.from('pf_panels').select('*');
                renderPanels(data);
            } else {
                content.innerHTML = `<div style="text-align:center; padding:50px;">سيتم ربط جدول (${page}) قريباً...</div>`;
            }
        } catch (e) {
            content.innerHTML = "حدث خطأ أثناء جلب البيانات.";
        }
    }

    function renderStations(data) {
        let html = `<table class="data-table"><thead><tr><th>اسم المحطة</th><th>الحالة</th><th>آخر صيانة</th></tr></thead><tbody>`;
        data.forEach(s => {
            html += `<tr><td>${s.station_name}</td><td><span class="status-badge status-active">نشط</span></td><td>${s.last_maintenance || '-'}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('pageContent').innerHTML = html;
    }

    function renderDashboard() {
        document.getElementById('pageContent').innerHTML = `
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
                <div style="background:var(--card-bg); padding:20px; border-radius:15px; text-align:center;">
                    <h3>المحطات</h3><p style="font-size:2rem; color:var(--primary);">12</p>
                </div>
                <div style="background:var(--card-bg); padding:20px; border-radius:15px; text-align:center;">
                    <h3>بلاغات مفتوحة</h3><p style="font-size:2rem; color:#e74c3c;">3</p>
                </div>
            </div>
        `;
    }

    // تشغيل الصفحة الرئيسية عند الفتح
    window.onload = () => loadPage('dashboard');
</script>
</body>
</html>
