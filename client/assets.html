<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الأصول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: transparent;
            color: #fff;
            padding: 15px;
        }
        .assets-container {
            width: 100%;
            max-width: 100%;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(0,212,255,0.3);
            flex-wrap: wrap;
            gap: 15px;
        }
        .page-header h2 {
            color: #00d4ff;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* تبويبات الأقسام */
        .asset-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .asset-tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
        }
        .asset-tab.active, .asset-tab:hover {
            background: #00d4ff;
            color: #1a1a2e;
        }
        /* قائمة المحطات */
        .station-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 30px;
            padding: 8px 15px;
            color: #fff;
            width: 250px;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .btn-primary {
            background: #00d4ff;
            color: #1a1a2e;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.7rem;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 10px 8px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
        }
        .data-table th {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e2a3a;
            border-radius: 20px;
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-header h3 {
            color: #00d4ff;
            font-size: 1.1rem;
        }
        .modal-close {
            font-size: 1.5rem;
            cursor: pointer;
            color: #dc3545;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: #00d4ff;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.8rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
        }
        .table-responsive {
            overflow-x: auto;
        }
        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .warning-box {
            background: rgba(255,193,7,0.2);
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .asset-tabs {
                justify-content: center;
            }
            .asset-tab {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<div class="assets-container">
    <div class="page-header">
        <h2><i class="fas fa-microchip"></i> إدارة الأصول</h2>
        <select id="stationSelect" class="station-select">
            <option value="">-- اختر المحطة أولاً --</option>
        </select>
    </div>

    <!-- تبويبات الأقسام -->
    <div class="asset-tabs" id="assetTabs">
        <div class="asset-tab active" data-type="transformers">🔌 محولات</div>
        <div class="asset-tab" data-type="generators">⚡ مولدات</div>
        <div class="asset-tab" data-type="panels">📊 لوحات كهربائية</div>
        <div class="asset-tab" data-type="main_pumps">💧 طلمبات رئيسية</div>
        <div class="asset-tab" data-type="sub_pumps">💧 طلمبات فرعية</div>
        <div class="asset-tab" data-type="other_assets">📦 أصول أخرى</div>
        <div class="asset-tab" data-type="buildings">🏢 مباني</div>
    </div>

    <div style="margin-bottom: 15px;">
        <button class="btn btn-primary" id="addAssetBtn"><i class="fas fa-plus"></i> إضافة جديد</button>
    </div>

    <div id="assetsList">
        <div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p>جاري تحميل البيانات...</p></div>
    </div>
</div>

<!-- المودال العام -->
<div id="assetModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">إضافة</h3>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <form id="assetForm">
            <input type="hidden" id="assetId">
            <div id="formFields"></div>
            <div class="form-actions">
                <button type="button" class="btn" onclick="closeModal()" style="background:#6c757d;">إلغاء</button>
                <button type="submit" class="btn btn-primary">💾 حفظ</button>
            </div>
        </form>
    </div>
</div>

    // ========== تحميل قائمة المحطات ==========
async function loadStationsSelect() {
    const select = document.getElementById('stationSelect');
    if (!select) {
        console.error('عنصر stationSelect غير موجود');
        return;
    }
    
    select.innerHTML = '<option value="">-- جاري التحميل --</option>';
    
    try {
        console.log('جاري جلب المحطات...');
        
        // نفس الطريقة اللي شغالة في stations.html
        const { data, error } = await supabaseClient
            .from('stations')
            .select('id, station_name, station_code')
            .order('station_name');
        
        if (error) {
            console.error('خطأ في جلب المحطات:', error);
            select.innerHTML = '<option value="">-- خطأ في التحميل --</option>';
            return;
        }
        
        console.log('عدد المحطات التي تم جلبها:', data?.length);
        console.log('المحطات:', data);
        
        stationsList = data || [];
        
        if (stationsList.length === 0) {
            select.innerHTML = '<option value="">-- لا توجد محطات --</option>';
            document.getElementById('assetsList').innerHTML = `
                <div style="background:rgba(255,193,7,0.2); border:1px solid #ffc107; border-radius:12px; padding:20px; text-align:center;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>لا توجد محطات مسجلة</p>
                    <p>الرجاء إضافة محطة أولاً من <strong>صفحة المحطات</strong></p>
                </div>
            `;
            return;
        }
        
        // ملء القائمة
        select.innerHTML = '<option value="">-- اختر المحطة --</option>';
        stationsList.forEach(station => {
            const option = document.createElement('option');
            option.value = station.id;
            option.textContent = `${station.station_name} (${station.station_code || station.id})`;
            select.appendChild(option);
        });
        
        console.log('تم تحميل ' + stationsList.length + ' محطة بنجاح');
        
    } catch (error) {
        console.error('خطأ:', error);
        select.innerHTML = '<option value="">-- خطأ في الاتصال --</option>';
    }
}
    // ========== تحميل الأصول حسب النوع ==========
    async function loadAssets() {
        if (!currentStationId) {
            document.getElementById('assetsList').innerHTML = '<div class="warning-box"><i class="fas fa-info-circle"></i> الرجاء اختيار محطة أولاً لعرض الأصول الخاصة بها</div>';
            return;
        }
        document.getElementById('assetsList').innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>';
        
        try {
            let result;
            if (currentAssetType === 'transformers') result = await getTransformers();
            else if (currentAssetType === 'generators') result = await getGeneratorsData();
            else if (currentAssetType === 'panels') result = await getElectricalPanels();
            else if (currentAssetType === 'main_pumps') result = await getMainPumpsData();
            else if (currentAssetType === 'sub_pumps') result = await getSubPumpsData();
            else if (currentAssetType === 'other_assets') result = await getOtherAssetsData();
            else if (currentAssetType === 'buildings') result = await getBuildingsData();
            else result = { success: true, data: [] };
            
            if (result.success) {
                assetsData = result.data || [];
                renderTable();
            } else {
                document.getElementById('assetsList').innerHTML = `<div class="no-data">${result.message}</div>`;
            }
        } catch (error) {
            document.getElementById('assetsList').innerHTML = '<div class="no-data">خطأ في تحميل البيانات</div>';
        }
    }

    // ========== دوال API لكل قسم ==========
    
    async function getTransformers() {
        const { data, error } = await supabaseClient
            .from('transformers')
            .select('*')
            .eq('station_id', currentStationId)
            .order('transformer_number');
        if (error) return { success: false, message: error.message, data: [] };
        return { success: true, data: data || [] };
    }
    
    async function createTransformer(data) {
        const newData = { ...data, station_id: currentStationId, created_at: new Date(), updated_at: new Date() };
        const { data: result, error } = await supabaseClient.from('transformers').insert([newData]).select();
        if (error) return { success: false, message: error.message };
        return { success: true, data: result[0], message: '✅ تم إضافة المحول' };
    }
    
    async function updateTransformer(id, data) {
        const updateData = { ...data, updated_at: new Date() };
        const { data: result, error } = await supabaseClient.from('transformers').update(updateData).eq('id', id).select();
        if (error) return { success: false, message: error.message };
        return { success: true, data: result[0], message: '✅ تم تحديث المحول' };
    }
    
    async function deleteTransformer(id) {
        const { error } = await supabaseClient.from('transformers').delete().eq('id', id);
        if (error) return { success: false, message: error.message };
        return { success: true, message: '✅ تم حذف المحول' };
    }

    // ========== نماذج الإضافة لكل قسم ==========
    function getFormFields(type, data = {}) {
        if (type === 'transformers') {
            return `
                <div class="form-row">
                    <div class="form-group"><label>رقم المحول *</label><input type="text" id="transformer_number" value="${data.transformer_number || ''}" required></div>
                    <div class="form-group"><label>قدرة المحول (KVA)</label><input type="number" id="rated_power_kva" step="0.01" value="${data.rated_power_kva || ''}"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>جهد الدخول (KV)</label><input type="number" id="input_voltage_kv" step="0.01" value="${data.input_voltage_kv || ''}"></div>
                    <div class="form-group"><label>جهد الخروج (V)</label><input type="number" id="output_voltage_v" step="0.01" value="${data.output_voltage_v || ''}"></div>
                </div>
                <div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2">${data.notes || ''}</textarea></div>
            `;
        } else if (type === 'generators') {
            return `
                <div class="form-row">
                    <div class="form-group"><label>رقم المولد *</label><input type="text" id="generator_number" value="${data.generator_number || ''}" required></div>
                    <div class="form-group"><label>نوع المحرك</label><input type="text" id="engine_type" value="${data.engine_type || ''}"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>معدل السولار على الحمل (لتر/س)</label><input type="number" id="fuel_rate_with_load" step="0.01" value="${data.fuel_rate_with_load || ''}"></div>
                    <div class="form-group"><label>معدل السولار بدون حمل (لتر/س)</label><input type="number" id="fuel_rate_no_load" step="0.01" value="${data.fuel_rate_no_load || ''}"></div>

            `;
        } else if (type === 'sub_pumps') {
            return `
                <div class="form-row">
                    <div class="form-group"><label>رقم الطلمبة *</label><input type="text" id="pump_number" value="${data.pump_number || ''}" required></div>
                    <div class="form-group"><label>نوع الطلمبة</label><select id="pump_type">
                        <option value="غاطس" ${data.pump_type === 'غاطس' ? 'selected' : ''}>غاطس</option>
                        <option value="حبس جلندات" ${data.pump_type === 'حبس جلندات' ? 'selected' : ''}>حبس جلندات</option>
                        <option value="حمأة" ${data.pump_type === 'حمأة' ? 'selected' : ''}>حمأة</option>
                        <option value="تصافي" ${data.pump_type === 'تصافي' ? 'selected' : ''}>تصافي</option>
                        <option value="مياه معادة" ${data.pump_type === 'مياه معادة' ? 'selected' : ''}>مياه معادة</option>
                        <option value="بوستر" ${data.pump_type === 'بوستر' ? 'selected' : ''}>بوستر</option>
                        <option value="سولار" ${data.pump_type === 'سولار' ? 'selected' : ''}>سولار</option>
                        <option value="اطفاء حريق" ${data.pump_type === 'اطفاء حريق' ? 'selected' : ''}>اطفاء حريق</option>
                    </select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>التصرف (م³/ساعة)</label><input type="number" id="flow_rate_m3h" step="0.01" value="${data.flow_rate_m3h || ''}"></div>
                    <div class="form-group"><label>الرفع (متر)</label><input type="number" id="head_m" step="0.01" value="${data.head_m || ''}"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>قدرة المحرك (KW)</label><input type="number" id="motor_power_kw" step="0.01" value="${data.motor_power_kw || ''}"></div>
                    <div class="form-group"><label>سرعة المحرك (RPM)</label><input type="number" id="motor_rpm" value="${data.motor_rpm || ''}"></div>
                </div>
                <div class="form-group"><label>وصف</label><textarea id="description" rows="2">${data.description || ''}</textarea></div>
                <div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2">${data.notes || ''}</textarea></div>
            `;
        } else if (type === 'other_assets') {
            return `
                <div class="form-row">
                    <div class="form-group"><label>رقم الأصل *</label><input type="text" id="asset_number" value="${data.asset_number || ''}" required></div>
                    <div class="form-group"><label>نوع الأصل</label><select id="asset_type">
                        <option value="مطرقة مائية" ${data.asset_type === 'مطرقة مائية' ? 'selected' : ''}>مطرقة مائية</option>
                        <option value="جهاز قياس تصرف" ${data.asset_type === 'جهاز قياس تصرف' ? 'selected' : ''}>جهاز قياس تصرف</option>
                        <option value="جهاز قياس منسوب" ${data.asset_type === 'جهاز قياس منسوب' ? 'selected' : ''}>جهاز قياس منسوب</option>
                        <option value="مصفي ميكانيكية" ${data.asset_type === 'مصفي ميكانيكية' ? 'selected' : ''}>مصفي ميكانيكية</option>
                        <option value="عربة ازالة رمال" ${data.asset_type === 'عربة ازالة رمال' ? 'selected' : ''}>عربة ازالة رمال</option>
                        <option value="حوض ترسيب ابتدائي" ${data.asset_type === 'حوض ترسيب ابتدائي' ? 'selected' : ''}>حوض ترسيب ابتدائي</option>
                        <option value="حوض ترسيب نهائي" ${data.asset_type === 'حوض ترسيب نهائي' ? 'selected' : ''}>حوض ترسيب نهائي</option>
                        <option value="حوض سكنر" ${data.asset_type === 'حوض سكنر' ? 'selected' : ''}>حوض سكنر</option>
                        <option value="مرشح زلطي" ${data.asset_type === 'مرشح زلطي' ? 'selected' : ''}>مرشح زلطي</option>
                        <option value="مروحة تهوية" ${data.asset_type === 'مروحة تهوية' ? 'selected' : ''}>مروحة تهوية</option>
                        <option value="جهاز تحكم كلور" ${data.asset_type === 'جهاز تحكم كلور' ? 'selected' : ''}>جهاز تحكم كلور</option>
                        <option value="نافخ هواء" ${data.asset_type === 'نافخ هواء' ? 'selected' : ''}>نافخ هواء</option>
                        <option value="ضاغط هواء" ${data.asset_type === 'ضاغط هواء' ? 'selected' : ''}>ضاغط هواء</option>
                        <option value="ونش" ${data.asset_type === 'ونش' ? 'selected' : ''}>ونش</option>
                        <option value="مشحمة كهربائية" ${data.asset_type === 'مشحمة كهربائية' ? 'selected' : ''}>مشحمة كهربائية</option>
                    </select></div>
                </div>
                <div class="form-group"><label>وصف الأصل</label><textarea id="description" rows="2">${data.description || ''}</textarea></div>
                <div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2">${data.notes || ''}</textarea></div>
            `;
        } else if (type === 'buildings') {
            return `
                <div class="form-row">
                    <div class="form-group"><label>رقم المبنى *</label><input type="text" id="building_number" value="${data.building_number || ''}" required></div>
                    <div class="form-group"><label>اسم المبنى</label><input type="text" id="building_name" value="${data.building_name || ''}"></div>
                </div>
                <div class="form-group"><label>وصف المبنى</label><textarea id="description" rows="2">${data.description || ''}</textarea></div>
                <div class="form-group"><label>ملاحظات</label><textarea id="notes" rows="2">${data.notes || ''}</textarea></div>
            `;
        }
        return '<div class="form-group"><label>لا توجد حقول</label></div>';
    }
    
    // ========== عرض الجدول ==========
    function renderTable() {
        const container = document.getElementById('assetsList');
        if (!assetsData.length) {
            container.innerHTML = '<div class="no-data"><i class="fas fa-database"></i> لا توجد بيانات</div>';
            return;
        }
        
        let columns = [];
        let fields = [];
        
        if (currentAssetType === 'transformers') {
            columns = ['رقم المحول', 'قدرة (KVA)', 'جهد دخول (KV)', 'جهد خروج (V)', 'ملاحظات'];
            fields = ['transformer_number', 'rated_power_kva', 'input_voltage_kv', 'output_voltage_v', 'notes'];
        } else if (currentAssetType === 'generators') {
            columns = ['رقم المولد', 'نوع المحرك', 'نوع المولد', 'قدرة (KVA)', 'ملاحظات'];
            fields = ['generator_number', 'engine_type', 'generator_type', 'rated_power_kva', 'notes'];
        } else if (currentAssetType === 'panels') {
            columns = ['رقم اللوحة', 'اسم اللوحة', 'نوع اللوحة', 'مصدر التغذية', 'جهد (V)', 'ملاحظات'];
            fields = ['panel_number', 'panel_name', 'panel_type', 'power_source', 'supply_voltage_v', 'notes'];
        } else if (currentAssetType === 'main_pumps') {
            columns = ['رقم الطلمبة', 'النوع', 'التصرف (م³/س)', 'الرفع (م)', 'قدرة (KW)', 'ملاحظات'];
            fields = ['pump_number', 'pump_type', 'flow_rate_m3h', 'head_m', 'motor_power_kw', 'notes'];
        } else if (currentAssetType === 'sub_pumps') {
            columns = ['رقم الطلمبة', 'النوع', 'التصرف (م³/س)', 'الرفع (م)', 'قدرة (KW)', 'ملاحظات'];
            fields = ['pump_number', 'pump_type', 'flow_rate_m3h', 'head_m', 'motor_power_kw', 'notes'];
        } else if (currentAssetType === 'other_assets') {
            columns = ['رقم الأصل', 'نوع الأصل', 'وصف', 'ملاحظات'];
            fields = ['asset_number', 'asset_type', 'description', 'notes'];
        } else if (currentAssetType === 'buildings') {
            columns = ['رقم المبنى', 'اسم المبنى', 'وصف', 'ملاحظات'];
            fields = ['building_number', 'building_name', 'description', 'notes'];
        }
        
        let html = '<div class="table-responsive"><table class="data-table"><thead>发展';
        columns.forEach(col => html += `<th>${col}</th>`);
        html += '<th>الإجراءات</th> </thead><tbody>';
        
        for (let i = 0; i < assetsData.length; i++) {
            const item = assetsData[i];
            html += '发展';
            for (let j = 0; j < fields.length; j++) {
                let val = item[fields[j]];
                if (val === undefined || val === null) val = '---';
                html += `<td>${val}</td>`;
            }
            html += `<td class="action-buttons">
                <button class="btn btn-sm btn-primary" onclick="editAsset(${item.id})"><i class="fas fa-edit"></i> تعديل</button>
                <button class="btn btn-sm btn-danger" onclick="deleteAsset(${item.id})"><i class="fas fa-trash"></i> حذف</button>
             </td>`;
            html += '发展';
        }
        html += '</tbody> </div>';
        container.innerHTML = html;
    }
    
    // ========== دوال المودال ==========
    function closeModal() {
        document.getElementById('assetModal').classList.remove('active');
    }
    window.closeModal = closeModal;
    
    let currentEditId = null;
    
    window.editAsset = async (id) => {
        const item = assetsData.find(a => a.id == id);
        if (!item) return;
        currentEditId = id;
        const fieldsHtml = getFormFields(currentAssetType, item);
        document.getElementById('formFields').innerHTML = fieldsHtml;
        document.getElementById('modalTitle').innerHTML = `<i class="fas fa-edit"></i> تعديل ${getTypeTitle()}`;
        document.getElementById('assetModal').classList.add('active');
    };
    
    window.deleteAsset = async (id) => {
        if (!confirm('⚠️ هل أنت متأكد من حذف هذا الأصل؟')) return;
        let result;
        if (currentAssetType === 'transformers') result = await deleteTransformer(id);
        else if (currentAssetType === 'generators') result = await deleteGenerator(id);
        else if (currentAssetType === 'panels') result = await deleteElectricalPanel(id);
        else if (currentAssetType === 'main_pumps') result = await deleteMainPump(id);
        else if (currentAssetType === 'sub_pumps') result = await deleteSubPump(id);
        else if (currentAssetType === 'other_assets') result = await deleteOtherAsset(id);
        else if (currentAssetType === 'buildings') result = await deleteBuilding(id);
        else return;
        if (result.success) {
            loadAssets();
            if (window.parent && window.parent.showToast) window.parent.showToast(result.message);
        } else alert(result.message);
    };
    
    function getTypeTitle() {
        const titles = {
            'transformers': 'محول',
            'generators': 'مولد',
            'panels': 'لوحة كهربائية',
            'main_pumps': 'طلمبة رئيسية',
            'sub_pumps': 'طلمبة فرعية',
            'other_assets': 'أصل',
            'buildings': 'مبنى'
        };
        return titles[currentAssetType] || 'أصل';
    }
    
    document.getElementById('addAssetBtn').addEventListener('click', () => {
        if (!currentStationId) { alert('⚠️ الرجاء اختيار المحطة أولاً'); return; }
        currentEditId = null;
        const fieldsHtml = getFormFields(currentAssetType, {});
        document.getElementById('formFields').innerHTML = fieldsHtml;
        document.getElementById('modalTitle').innerHTML = `<i class="fas fa-plus-circle"></i> إضافة ${getTypeTitle()}`;
        document.getElementById('assetModal').classList.add('active');
    });
    
    document.getElementById('assetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = {};
        const inputs = document.querySelectorAll('#assetForm input, #assetForm select, #assetForm textarea');
        inputs.forEach(input => { if (input.id) formData[input.id] = input.value; });
        
        let result;
        if (currentEditId) {
            if (currentAssetType === 'transformers') result = await updateTransformer(currentEditId, formData);
            else if (currentAssetType === 'generators') result = await updateGenerator(currentEditId, formData);
            else if (currentAssetType === 'panels') result = await updateElectricalPanel(currentEditId, formData);
            else if (currentAssetType === 'main_pumps') result = await updateMainPump(currentEditId, formData);
            else if (currentAssetType === 'sub_pumps') result = await updateSubPump(currentEditId, formData);
            else if (currentAssetType === 'other_assets') result = await updateOtherAsset(currentEditId, formData);
            else if (currentAssetType === 'buildings') result = await updateBuilding(currentEditId, formData);
        } else {
            if (currentAssetType === 'transformers') result = await createTransformer(formData);
            else if (currentAssetType === 'generators') result = await createGenerator(formData);
            else if (currentAssetType === 'panels') result = await createElectricalPanel(formData);
            else if (currentAssetType === 'main_pumps') result = await createMainPump(formData);
            else if (currentAssetType === 'sub_pumps') result = await createSubPump(formData);
            else if (currentAssetType === 'other_assets') result = await createOtherAsset(formData);
            else if (currentAssetType === 'buildings') result = await createBuilding(formData);
        }
        if (result && result.success) {
            closeModal();
            loadAssets();
            if (window.parent && window.parent.showToast) window.parent.showToast(result.message);
        } else {
            alert(result?.message || 'حدث خطأ');
        }
    });
    
    // ========== تهيئة الأحداث ==========
    document.getElementById('stationSelect').addEventListener('change', (e) => {
        currentStationId = e.target.value;
        if (currentStationId) loadAssets();
    });
    
    document.querySelectorAll('.asset-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.asset-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentAssetType = tab.getAttribute('data-type');
            if (currentStationId) loadAssets();
        });
    });
    
    loadStationsSelect();
</script>
</body>
</html>
