<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة تكاليف محطات بني مزار - كود كامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; line-height: 1.4; }
        
        /* شريط التعريفات والأسعار */
        .pricing-header { background: rgba(0, 212, 255, 0.15); padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; border: 1px solid #00d4ff; align-items: center; }
        .pricing-header label { font-size: 0.85rem; color: #00d4ff; }
        .pricing-header input { width: 90px; padding: 5px; border-radius: 5px; border: 1px solid #00d4ff; background: #0f3b4f; color: #fff; text-align: center; font-weight: bold; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 15px; flex-wrap: wrap; }
        .search-box { position: relative; flex-grow: 1; max-width: 400px; }
        .search-box input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 20px; border: none; background: #164a63; color: white; font-family: 'Cairo'; }
        .search-box i { position: absolute; left: 15px; top: 12px; color: #00d4ff; }

        .btn { padding: 10px 18px; border-radius: 20px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: 'Cairo'; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #2ecc71; color: white; }
        .btn-print { background: #f39c12; color: white; }
        
        .card { background: #164a63; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 1100px; }
        th { background: rgba(0, 212, 255, 0.1); color: #00d4ff; padding: 12px; border-bottom: 2px solid #00d4ff; font-size: 0.85rem; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }

        /* المودال */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: #164a63; width: 100%; max-width: 950px; border-radius: 20px; padding: 20px; max-height: 95vh; overflow-y: auto; border: 1px solid #00d4ff; }
        
        .section-tag { background: rgba(241, 196, 15, 0.15); color: #f1c40f; padding: 5px 15px; border-radius: 10px; display: inline-block; margin: 15px 0 10px 0; font-weight: bold; font-size: 0.9rem; width: 100%; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        label { display: block; margin-bottom: 4px; color: #00d4ff; font-size: 0.8rem; }
        input, select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #1e5f7a; background: #0f3b4f; color: #fff; font-family: 'Cairo'; font-size: 0.9rem; }
        input[readonly] { background: #0b2533; color: #2ecc71; border-style: dashed; }

        .actions-btn { display: flex; gap: 5px; }
        .btn-edit { background: #3498db; color: white; padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; }

        @media print { .no-print { display: none !important; } body { background: white; color: black; padding: 0; } .card { box-shadow: none; border: 1px solid #ccc; } table { min-width: 100%; } th { color: black; border-bottom: 2px solid black; } }
    </style>
</head>
<body>

    <div class="pricing-header no-print">
        <div><label>سعر ك.و كهرباء:</label> <input type="number" id="p_elec" step="0.01" onchange="updatePrices()"></div>
        <div><label>سعر لتر سولار:</label> <input type="number" id="p_solar" step="0.01" onchange="updatePrices()"></div>
        <div><label>سعر م3 مياه:</label> <input type="number" id="p_water" step="0.01" onchange="updatePrices()"></div>
    </div>

    <div class="header-section no-print">
        <h2><i class="fas fa-industry"></i> تكاليف تشغيل محطات بني مزار</h2>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث باسم المحطة أو الشهر...">
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-print" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
            <button class="btn btn-add" id="addReportBtn"><i class="fas fa-plus"></i> إضافة تقرير جديد</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>المحطة</th>
                    <th>الشهر</th>
                    <th>المياه المرفوعة (م3)</th>
                    <th>إجمالي الـ ك.و</th>
                    <th>السولار المستهلك</th>
                    <th>رصيد السولار الحالي</th>
                    <th>إجمالي التكلفة (ج.م)</th>
                    <th class="no-print">إجراءات</th>
                </tr>
            </thead>
            <tbody id="costsBody"></tbody>
        </table>
    </div>

    <div class="modal" id="costModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color: #00d4ff; margin-bottom: 15px; border-bottom: 1px solid #1e5f7a; padding-bottom: 10px;">بيانات تكاليف التشغيل</h3>
            <form id="costForm">
                <input type="hidden" id="editId">
                
                <div class="form-grid">
                    <div><label>المحطة</label><select id="mStation" required></select></div>
                    <div><label>الشهر</label><input type="month" id="mMonth" required></div>
                </div>

                <div class="section-tag">1. كمية المياه المرفوعة (طلمبتين)</div>
                <div class="form-grid">
                    <div><label>ساعات تشغيل (1)</label><input type="number" id="h1" class="calc" step="0.1" value="0"></div>
                    <div><label>تصرف طلمبة (1)</label><input type="number" id="f1" readonly></div>
                    <div><label>ساعات تشغيل (2)</label><input type="number" id="h2" class="calc" step="0.1" value="0"></div>
                    <div><label>تصرف طلمبة (2)</label><input type="number" id="f2" readonly></div>
                    <div><label>إجمالي المرفوع</label><input type="number" id="totalW" readonly></div>
                </div>

                <div class="section-tag">2. استهلاك الكهرباء (محول 1 & محول 2)</div>
                <div class="form-grid">
                    <div><label>سابق (محول 1)</label><input type="number" id="e1_prev" readonly></div>
                    <div><label>حالي (محول 1)</label><input type="number" id="e1_curr" class="calc" value="0"></div>
                    <div><label>سابق (محول 2)</label><input type="number" id="e2_prev" readonly></div>
                    <div><label>حالي (محول 2)</label><input type="number" id="e2_curr" class="calc" value="0"></div>
                    <div><label>إجمالي ك.و</label><input type="number" id="totalKW" readonly></div>
                </div>

                <div class="section-tag">3. استهلاك السولار (المولدات)</div>
                <div class="form-grid">
                    <div><label>رصيد سابق</label><input type="number" id="s_prev" readonly></div>
                    <div><label>كمية مضافة</label><input type="number" id="s_add" class="calc" value="0"></div>
                    <div><label>ساعات (على الحمل)</label><input type="number" id="s_h_load" class="calc" step="0.1" value="0"></div>
                    <div><label>ساعات (بدون حمل)</label><input type="number" id="s_h_no" class="calc" step="0.1" value="0"></div>
                    <div><label>معدل استهلاك الحمل</label><input type="number" id="rate_load" readonly></div>
                    <div><label>معدل بدون حمل</label><input type="number" id="rate_no" readonly></div>
                    <div><label>الرصيد الحالي</label><input type="number" id="s_final" readonly></div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-add" style="flex: 2; justify-content: center;">حفظ البيانات</button>
                    <button type="button" class="btn" onclick="closeModal()" style="background:#e74c3c; flex: 1; justify-content: center;">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let stations = [], pumps = [], generators = [], allReports = [];

        async function init() {
            // تحميل التعريفات المحفوظة
            document.getElementById('p_elec').value = localStorage.getItem('def_p_elec') || 0;
            document.getElementById('p_solar').value = localStorage.getItem('def_p_solar') || 0;
            document.getElementById('p_water').value = localStorage.getItem('def_p_water') || 0;

            const { data: st } = await supabaseClient.from('stations').select('*');
            stations = st || [];
            const { data: pm } = await supabaseClient.from('main_pumps').select('*');
            pumps = pm || [];
            const { data: gn } = await supabaseClient.from('generators').select('*');
            generators = gn || [];

            const sSelect = document.getElementById('mStation');
            sSelect.innerHTML = '<option value="">اختر المحطة</option>';
            stations.forEach(s => sSelect.innerHTML += `<option value="${s.id}">${s.station_name}</option>`);

            await loadReports();
            setupEvents();
        }

        function updatePrices() {
            localStorage.setItem('def_p_elec', document.getElementById('p_elec').value);
            localStorage.setItem('def_p_solar', document.getElementById('p_solar').value);
            localStorage.setItem('def_p_water', document.getElementById('p_water').value);
            renderTable(allReports);
        }

        async function loadReports() {
            const { data } = await supabaseClient.from('station_costs').select('*').order('accounting_month', { ascending: false });
            allReports = data || [];
            renderTable(allReports);
        }

        function renderTable(dataList) {
            const body = document.getElementById('costsBody');
            const pe = parseFloat(localStorage.getItem('def_p_elec')) || 0;
            const ps = parseFloat(localStorage.getItem('def_p_solar')) || 0;

            body.innerHTML = dataList.map(r => {
                const totalCost = (r.total_kw * pe) + (r.solar_consumed * ps);
                return `
                <tr>
                    <td>${r.station_name}</td>
                    <td>${r.accounting_month.substring(0, 7)}</td>
                    <td style="color:#2ecc71; font-weight:bold;">${r.total_water_produced}</td>
                    <td style="color:#00d4ff">${r.total_kw}</td>
                    <td style="color:#f39c12">${r.solar_consumed}</td>
                    <td>${r.solar_current_balance}</td>
                    <td style="font-weight:bold; color:#f1c40f;">${totalCost.toLocaleString()} ج.م</td>
                    <td class="no-print">
                        <div class="actions-btn">
                            <button class="btn-edit" onclick="editReport('${r.id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn-delete" onclick="deleteReport('${r.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function setupEvents() {
            document.getElementById('addReportBtn').onclick = () => {
                document.getElementById('costForm').reset();
                document.getElementById('editId').value = '';
                document.getElementById('modalTitle').innerText = 'إضافة تقرير تكاليف جديد';
                document.getElementById('costModal').classList.add('active');
            };

            document.getElementById('mStation').onchange = (e) => {
                const sid = e.target.value;
                // جلب تصرف الطلمبات
                const stPumps = pumps.filter(p => String(p.station_id) === String(sid));
                document.getElementById('f1').value = stPumps[0]?.flow_rate || 0;
                document.getElementById('f2').value = stPumps[1]?.flow_rate || 0;
                // جلب معدلات المولد
                const gen = generators.find(g => String(g.station_id) === String(sid));
                document.getElementById('rate_load').value = gen?.consumption_rate_load || 0;
                document.getElementById('rate_no').value = gen?.consumption_rate_no_load || 0;
                
                fetchPrevious();
                calculate();
            };

            document.getElementById('mMonth').onchange = fetchPrevious;
            document.querySelectorAll('.calc').forEach(input => input.oninput = calculate);
            document.getElementById('costForm').onsubmit = handleSave;

            document.getElementById('searchInput').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allReports.filter(r => 
                    r.station_name.toLowerCase().includes(term) || 
                    r.accounting_month.includes(term)
                );
                renderTable(filtered);
            };
        }

        async function fetchPrevious() {
            const sid = document.getElementById('mStation').value;
            const month = document.getElementById('mMonth').value;
            if(!sid || !month || document.getElementById('editId').value) return;

            let d = new Date(month + "-01");
            d.setMonth(d.getMonth() - 1);
            const prevStr = d.toISOString().split('T')[0];

            const { data } = await supabaseClient.from('station_costs')
                .select('*').eq('station_id', sid).eq('accounting_month', prevStr).single();
            
            if(data) {
                document.getElementById('e1_prev').value = data.e1_curr || 0;
                document.getElementById('e2_prev').value = data.e2_curr || 0;
                document.getElementById('s_prev').value = data.solar_current_balance || 0;
            } else {
                document.getElementById('e1_prev').value = 0;
                document.getElementById('e2_prev').value = 0;
                document.getElementById('s_prev').value = 0;
            }
            calculate();
        }

        function calculate() {
            // 1. حساب المياه المرفوعة
            const w1 = (parseFloat(document.getElementById('h1').value) || 0) * (parseFloat(document.getElementById('f1').value) || 0);
            const w2 = (parseFloat(document.getElementById('h2').value) || 0) * (parseFloat(document.getElementById('f2').value) || 0);
            document.getElementById('totalW').value = (w1 + w2).toFixed(2);

            // 2. حساب الكهرباء (فرق القراءات)
            const kw1 = (parseFloat(document.getElementById('e1_curr').value) || 0) - (parseFloat(document.getElementById('e1_prev').value) || 0);
            const kw2 = (parseFloat(document.getElementById('e2_curr').value) || 0) - (parseFloat(document.getElementById('e2_prev').value) || 0);
            document.getElementById('totalKW').value = (Math.max(0, kw1) + Math.max(0, kw2)).toFixed(2);

            // 3. حساب السولار (استهلاك ورصيد)
            const cons_load = (parseFloat(document.getElementById('s_h_load').value) || 0) * (parseFloat(document.getElementById('rate_load').value) || 0);
            const cons_no = (parseFloat(document.getElementById('s_h_no').value) || 0) * (parseFloat(document.getElementById('rate_no').value) || 0);
            const totalConsumed = cons_load + cons_no;
            
            const currentBalance = (parseFloat(document.getElementById('s_prev').value) || 0) + 
                                   (parseFloat(document.getElementById('s_add').value) || 0) - totalConsumed;
            
            document.getElementById('s_final').value = currentBalance.toFixed(2);
            document.getElementById('costForm').dataset.consumed = totalConsumed.toFixed(2);
        }

        async function handleSave(e) {
            e.preventDefault();
            const s = document.getElementById('mStation');
            const id = document.getElementById('editId').value;
            const payload = {
                station_id: s.value,
                station_name: s.options[s.selectedIndex].text,
                accounting_month: document.getElementById('mMonth').value + "-01",
                total_water_produced: document.getElementById('totalW').value,
                total_kw: document.getElementById('totalKW').value,
                solar_consumed: document.getElementById('costForm').dataset.consumed || 0,
                solar_current_balance: document.getElementById('s_final').value,
                e1_curr: document.getElementById('e1_curr').value,
                e2_curr: document.getElementById('e2_curr').value,
                // تخزين الساعات للرجوع إليها في التعديل
                h1: document.getElementById('h1').value,
                h2: document.getElementById('h2').value,
                s_h_load: document.getElementById('s_h_load').value,
                s_h_no: document.getElementById('s_h_no').value,
                s_add: document.getElementById('s_add').value
            };

            const res = id ? await supabaseClient.from('station_costs').update(payload).eq('id', id) 
                           : await supabaseClient.from('station_costs').insert([payload]);

            if(!res.error) { closeModal(); loadReports(); } 
            else { alert("خطأ في الحفظ: " + res.error.message); }
        }

        window.editReport = (id) => {
            const r = allReports.find(x => String(x.id) === String(id));
            if(!r) return;
            document.getElementById('editId').value = r.id;
            document.getElementById('modalTitle').innerText = 'تعديل بيانات التقرير';
            document.getElementById('mStation').value = r.station_id;
            document.getElementById('mMonth').value = r.accounting_month.substring(0, 7);
            
            // ملء الخانات المخزنة
            document.getElementById('h1').value = r.h1 || 0;
            document.getElementById('h2').value = r.h2 || 0;
            document.getElementById('e1_curr').value = r.e1_curr || 0;
            document.getElementById('e2_curr').value = r.e2_curr || 0;
            document.getElementById('s_add').value = r.s_add || 0;
            document.getElementById('s_h_load').value = r.s_h_load || 0;
            document.getElementById('s_h_no').value = r.s_h_no || 0;

            // استدعاء البيانات المرتبطة (تصرف ومعدلات)
            document.getElementById('mStation').dispatchEvent(new Event('change'));
            document.getElementById('costModal').classList.add('active');
        };

        window.deleteReport = async (id) => {
            if(confirm('هل أنت متأكد من حذف هذا التقرير نهائياً؟')) {
                const { error } = await supabaseClient.from('station_costs').delete().eq('id', id);
                if(!error) loadReports(); else alert("خطأ في الحذف");
            }
        };

        window.closeModal = () => document.getElementById('costModal').classList.remove('active');

        init();
    </script>
</body>
</html>
