<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة التكاليف - نظام العدادات المزدوجة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; }
        
        /* شريط الإعدادات الثابتة */
        .settings-bar { background: rgba(0, 212, 255, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; border: 1px solid #00d4ff; }
        .settings-bar input { width: 90px; padding: 5px; border-radius: 5px; border: 1px solid #00d4ff; background: #0f3b4f; color: #fff; text-align: center; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .btn-add { background: #2ecc71; color: white; }
        
        .card { background: #164a63; border-radius: 15px; padding: 20px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 900px; }
        th { color: #00d4ff; padding: 15px; border-bottom: 2px solid #00d4ff; background: rgba(0, 212, 255, 0.05); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* المودال */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #164a63; width: 100%; max-width: 850px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .section-tag { background: rgba(241, 196, 15, 0.1); color: #f1c40f; padding: 5px 15px; border-radius: 15px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        
        label { display: block; margin-bottom: 5px; color: #00d4ff; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #1e5f7a; background: #0f3b4f; color: #fff; font-family: 'Cairo'; }
        input[readonly] { background: #0b2533; color: #2ecc71; border-style: dashed; }

        @media print { .no-print { display: none !important; } body { background: white; color: black; } }
    </style>
</head>
<body>

    <div class="settings-bar no-print">
        <div><i class="fas fa-bolt"></i> سعر الكيلووات (ج.م): <input type="number" id="p_elec" value="0" onchange="localStorage.setItem('p_elec', this.value)"></div>
        <div><i class="fas fa-gas-pump"></i> سعر السولار (ج.م): <input type="number" id="p_solar" value="0" onchange="localStorage.setItem('p_solar', this.value)"></div>
    </div>

    <div class="header-section no-print">
        <h2><i class="fas fa-file-invoice-dollar"></i> تقرير تكاليف المحطة</h2>
        <button class="btn btn-add" id="addReportBtn"><i class="fas fa-plus"></i> إضافة شهر جديد</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>المحطة</th>
                    <th>الشهر</th>
                    <th>استهلاك عداد 1</th>
                    <th>استهلاك عداد 2</th>
                    <th>إجمالي الـ ك.و</th>
                    <th>التكلفة التقريبية</th>
                    <th class="no-print">إجراءات</th>
                </tr>
            </thead>
            <tbody id="costsBody"></tbody>
        </table>
    </div>

    <div class="modal" id="costModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; color: #00d4ff;">إدخال بيانات العدادات والتكاليف</h3>
            <form id="costForm">
                <div class="form-grid">
                    <div><label>المحطة</label><select id="mStation" required></select></div>
                    <div><label>الشهر</label><input type="month" id="mMonth" required></div>
                </div>

                <div class="section-tag"><i class="fas fa-bolt"></i> العداد رقم (1) - قوى محركة</div>
                <div class="form-grid">
                    <div><label>قراءة سابقة (1)</label><input type="number" id="e1_prev" readonly></div>
                    <div><label>قراءة حالية (1)</label><input type="number" id="e1_curr" class="calc" required></div>
                    <div><label>استهلاك عداد 1</label><input type="number" id="e1_diff" readonly></div>
                </div>

                <div class="section-tag"><i class="fas fa-lightbulb"></i> العداد رقم (2) - إنارة/خدمات</div>
                <div class="form-grid">
                    <div><label>قراءة سابقة (2)</label><input type="number" id="e2_prev" readonly></div>
                    <div><label>قراءة حالية (2)</label><input type="number" id="e2_curr" class="calc" required></div>
                    <div><label>استهلاك عداد 2</label><input type="number" id="e2_diff" readonly></div>
                </div>

                <div class="section-tag"><i class="fas fa-chart-line"></i> الإجمالي</div>
                <div class="form-grid">
                    <div><label>إجمالي الاستهلاك (ك.و)</label><input type="number" id="totalKW" readonly style="font-weight: bold; color: #f1c40f;"></div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-add" style="flex: 2; justify-content: center;">حفظ التقرير</button>
                    <button type="button" class="btn" onclick="closeModal()" style="background:#e74c3c; flex: 1; justify-content: center;">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let stations = [];

        async function init() {
            // استرجاع الأسعار المحفوظة
            document.getElementById('p_elec').value = localStorage.getItem('p_elec') || 0;
            document.getElementById('p_solar').value = localStorage.getItem('p_solar') || 0;

            const { data } = await supabaseClient.from('stations').select('*');
            stations = data || [];
            const sSelect = document.getElementById('mStation');
            stations.forEach(s => sSelect.innerHTML += `<option value="${s.id}">${s.station_name}</option>`);

            loadReports();
            setupEvents();
        }

        async function loadReports() {
            const { data } = await supabaseClient.from('station_costs').select('*').order('accounting_month', { ascending: false });
            const body = document.getElementById('costsBody');
            const price = parseFloat(localStorage.getItem('p_elec')) || 0;

            body.innerHTML = data?.map(r => `
                <tr>
                    <td>${r.station_name}</td>
                    <td>${r.accounting_month.substring(0, 7)}</td>
                    <td>${r.e1_diff || 0}</td>
                    <td>${r.e2_diff || 0}</td>
                    <td style="color:#f1c40f; font-weight:bold;">${r.total_kw || 0}</td>
                    <td style="color:#2ecc71">${((r.total_kw || 0) * price).toFixed(2)} ج.م</td>
                    <td class="no-print">
                        <button onclick="deleteReport('${r.id}')" style="background:none; border:none; color:#e74c3c; cursor:pointer;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('') || '';
        }

        function setupEvents() {
            document.getElementById('addReportBtn').onclick = () => {
                document.getElementById('costForm').reset();
                document.getElementById('costModal').classList.add('active');
            };

            document.getElementById('mMonth').onchange = fetchPrevious;
            document.querySelectorAll('.calc').forEach(i => i.oninput = calculate);
            document.getElementById('costForm').onsubmit = handleSave;
        }

        async function fetchPrevious() {
            const sid = document.getElementById('mStation').value;
            const month = document.getElementById('mMonth').value;
            if(!sid || !month) return;

            let d = new Date(month + "-01");
            d.setMonth(d.getMonth() - 1);
            const prevStr = d.toISOString().split('T')[0];

            const { data } = await supabaseClient.from('station_costs').select('*').eq('station_id', sid).eq('accounting_month', prevStr).single();
            if(data) {
                document.getElementById('e1_prev').value = data.e1_curr || 0;
                document.getElementById('e2_prev').value = data.e2_curr || 0;
            } else {
                // لو مفيش شهر سابق اسمح بالإدخال اليدوي للقراءة السابقة
                document.getElementById('e1_prev').readOnly = false;
                document.getElementById('e2_prev').readOnly = false;
            }
        }

        function calculate() {
            const e1_p = parseFloat(document.getElementById('e1_prev').value) || 0;
            const e1_c = parseFloat(document.getElementById('e1_curr').value) || 0;
            const e2_p = parseFloat(document.getElementById('e2_prev').value) || 0;
            const e2_c = parseFloat(document.getElementById('e2_curr').value) || 0;

            const diff1 = Math.max(0, e1_c - e1_p);
            const diff2 = Math.max(0, e2_c - e2_p);

            document.getElementById('e1_diff').value = diff1;
            document.getElementById('e2_diff').value = diff2;
            document.getElementById('totalKW').value = diff1 + diff2;
        }

        async function handleSave(e) {
            e.preventDefault();
            const s = document.getElementById('mStation');
            const payload = {
                station_id: s.value,
                station_name: s.options[s.selectedIndex].text,
                accounting_month: document.getElementById('mMonth').value + "-01",
                e1_curr: document.getElementById('e1_curr').value,
                e2_curr: document.getElementById('e2_curr').value,
                e1_diff: document.getElementById('e1_diff').value,
                e2_diff: document.getElementById('e2_diff').value,
                total_kw: document.getElementById('totalKW').value
            };

            const { error } = await supabaseClient.from('station_costs').insert([payload]);
            if(!error) { closeModal(); loadReports(); } else { alert("خطأ: " + error.message); }
        }

        window.deleteReport = async (id) => {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                await supabaseClient.from('station_costs').delete().eq('id', id);
                loadReports();
            }
        };

        window.closeModal = () => document.getElementById('costModal').classList.remove('active');
        init();
    </script>
</body>
</html>
