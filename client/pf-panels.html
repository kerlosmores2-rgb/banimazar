<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة التكاليف الشهرية - بني مزار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; line-height: 1.6; }
        
        /* الهيدر والبحث */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .search-box { position: relative; flex-grow: 1; max-width: 400px; }
        .search-box input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 20px; border: none; background: #164a63; color: white; font-family: 'Cairo'; }
        .search-box i { position: absolute; left: 15px; top: 12px; color: #00d4ff; }

        .btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; font-family: 'Cairo'; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #2ecc71; color: white; }
        .btn-edit { background: #3498db; color: white; padding: 5px 10px; border-radius: 5px; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; }

        .card { background: #164a63; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; min-width: 900px; }
        th { background: rgba(0, 212, 255, 0.1); color: #00d4ff; padding: 15px; border-bottom: 2px solid #00d4ff; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* المودال */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #164a63; width: 100%; max-width: 800px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #00d4ff; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #1e5f7a; background: #0f3b4f; color: #fff; font-family: 'Cairo'; }
        input[readonly] { background: #0b2533; color: #2ecc71; border-style: dashed; }
        
        .section-tag { background: rgba(241, 196, 15, 0.1); color: #f1c40f; padding: 5px 15px; border-radius: 15px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        .actions-cell { display: flex; gap: 8px; }
        
        @media print { .no-print { display: none !important; } body { background: white; color: black; } }
    </style>
</head>
<body>

    <div class="header-section no-print">
        <h2><i class="fas fa-file-invoice-dollar"></i> تكاليف محطات بني مزار</h2>
        
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث باسم المحطة أو الشهر...">
        </div>

        <button class="btn btn-add" id="addReportBtn"><i class="fas fa-plus"></i> إضافة تقرير جديد</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>المحطة</th>
                    <th>الشهر</th>
                    <th>إنتاج المياه (م3)</th>
                    <th>الكهرباء (ج.م)</th>
                    <th>رصيد السولار</th>
                    <th class="no-print">الإجراءات</th>
                </tr>
            </thead>
            <tbody id="costsBody"></tbody>
        </table>
    </div>

    <div class="modal" id="costModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-bottom: 20px; color: #00d4ff;">إضافة تقرير تكاليف</h3>
            <form id="costForm">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div><label>المحطة</label><select id="mStation" required></select></div>
                    <div><label>الشهر</label><input type="month" id="mMonth" required></div>
                </div>
                
                <div class="section-tag">بيانات المياه</div>
                <div class="form-grid">
                    <div><label>ساعات التشغيل</label><input type="number" id="h1" class="calc" step="0.1" value="0"></div>
                    <div><label>التصرف (م3/س)</label><input type="number" id="f1" readonly></div>
                    <div><label>إجمالي الإنتاج</label><input type="number" id="totalW" readonly></div>
                </div>

                <div class="section-tag">بيانات الكهرباء</div>
                <div class="form-grid">
                    <div><label>قراءة سابقة</label><input type="number" id="e_prev" readonly></div>
                    <div><label>قراءة حالية</label><input type="number" id="e_curr" class="calc" value="0"></div>
                    <div><label>قيمة الفاتورة</label><input type="number" id="e_bill" value="0"></div>
                </div>

                <div class="section-tag">بيانات السولار</div>
                <div class="form-grid">
                    <div><label>رصيد سابق</label><input type="number" id="s_prev" readonly></div>
                    <div><label>كمية مضافة</label><input type="number" id="s_add" class="calc" value="0"></div>
                    <div><label>الرصيد النهائي</label><input type="number" id="s_final" readonly></div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit" class="btn btn-add" style="flex: 2; justify-content: center;">حفظ البيانات</button>
                    <button type="button" class="btn" onclick="closeModal()" style="background:#e74c3c; flex: 1; justify-content: center;">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let stations = [], pumps = [], allReports = [];

        async function init() {
            try {
                const { data: st } = await supabaseClient.from('stations').select('*');
                stations = st || [];
                const { data: pm } = await supabaseClient.from('main_pumps').select('*');
                pumps = pm || [];

                const sSelect = document.getElementById('mStation');
                sSelect.innerHTML = '<option value="">اختر المحطة</option>';
                stations.forEach(s => sSelect.innerHTML += `<option value="${s.id}">${s.station_name}</option>`);

                await loadReports();
                setupEvents();
            } catch (err) { console.error("Init Error:", err); }
        }

        async function loadReports() {
            const { data } = await supabaseClient.from('station_costs').select('*').order('accounting_month', { ascending: false });
            allReports = data || [];
            renderTable(allReports);
        }

        function renderTable(dataList) {
            const body = document.getElementById('costsBody');
            body.innerHTML = dataList.map(r => `
                <tr>
                    <td>${r.station_name}</td>
                    <td>${r.accounting_month.substring(0, 7)}</td>
                    <td style="color:#f1c40f">${r.total_water_produced || 0}</td>
                    <td style="color:#00d4ff">${r.total_elec_cost || 0}</td>
                    <td style="color:#e67e22">${r.solar_current_balance || 0}</td>
                    <td class="actions-cell no-print">
                        <button class="btn-edit" onclick="editReport('${r.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteReport('${r.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
        }

        function setupEvents() {
            // إضافة
            document.getElementById('addReportBtn').onclick = () => {
                document.getElementById('costForm').reset();
                document.getElementById('editId').value = '';
                document.getElementById('modalTitle').innerText = 'إضافة تقرير تكاليف';
                document.getElementById('costModal').classList.add('active');
            };

            // البحث
            document.getElementById('searchInput').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allReports.filter(r => 
                    r.station_name.toLowerCase().includes(term) || 
                    r.accounting_month.includes(term)
                );
                renderTable(filtered);
            };

            // تغيير المحطة لجلب التصرف
            document.getElementById('mStation').onchange = (e) => {
                const p = pumps.find(p => String(p.station_id) === String(e.target.value));
                document.getElementById('f1').value = p ? p.flow_rate : 0;
                calculate();
            };

            document.getElementById('mMonth').onchange = fetchPrevious;
            document.querySelectorAll('.calc').forEach(i => i.oninput = calculate);
            document.getElementById('costForm').onsubmit = handleSave;
        }

        async function fetchPrevious() {
            const sid = document.getElementById('mStation').value;
            const month = document.getElementById('mMonth').value;
            if(!sid || !month || document.getElementById('editId').value) return;

            let d = new Date(month + "-01");
            d.setMonth(d.getMonth() - 1);
            const prevStr = d.toISOString().split('T')[0];

            const { data } = await supabaseClient.from('station_costs').select('*').eq('station_id', sid).eq('accounting_month', prevStr).single();
            if(data) {
                document.getElementById('e_prev').value = data.elec1_curr || 0;
                document.getElementById('s_prev').value = data.solar_current_balance || 0;
            } else {
                document.getElementById('e_prev').readOnly = false;
                document.getElementById('s_prev').readOnly = false;
            }
        }

        function calculate() {
            const w = (parseFloat(document.getElementById('h1').value) || 0) * (parseFloat(document.getElementById('f1').value) || 0);
            document.getElementById('totalW').value = w.toFixed(2);
            const finalSol = (parseFloat(document.getElementById('s_prev').value) || 0) + (parseFloat(document.getElementById('s_add').value) || 0);
            document.getElementById('s_final').value = finalSol.toFixed(2);
        }

        async function handleSave(e) {
            e.preventDefault();
            const s = document.getElementById('mStation');
            const id = document.getElementById('editId').value;
            
            const payload = {
                station_id: s.value,
                station_name: s.options[s.selectedIndex].text,
                accounting_month: document.getElementById('mMonth').value + "-01",
                total_water_produced: document.getElementById('totalW').value,
                total_elec_cost: document.getElementById('e_bill').value,
                solar_current_balance: document.getElementById('s_final').value,
                elec1_curr: document.getElementById('e_curr').value
            };

            let res;
            if(id) {
                res = await supabaseClient.from('station_costs').update(payload).eq('id', id);
            } else {
                res = await supabaseClient.from('station_costs').insert([payload]);
            }

            if(!res.error) { closeModal(); loadReports(); } else { alert("خطأ: " + res.error.message); }
        }

        window.editReport = (id) => {
            const r = allReports.find(x => String(x.id) === String(id));
            if(!r) return;
            
            document.getElementById('editId').value = r.id;
            document.getElementById('modalTitle').innerText = 'تعديل التقرير';
            document.getElementById('mStation').value = r.station_id;
            document.getElementById('mMonth').value = r.accounting_month.substring(0, 7);
            document.getElementById('totalW').value = r.total_water_produced;
            document.getElementById('e_bill').value = r.total_elec_cost;
            document.getElementById('s_final').value = r.solar_current_balance;
            document.getElementById('e_curr').value = r.elec1_curr;
            
            // جلب التصرف للمحطة المختارة
            const p = pumps.find(p => String(p.station_id) === String(r.station_id));
            document.getElementById('f1').value = p ? p.flow_rate : 0;
            
            document.getElementById('costModal').classList.add('active');
        };

        window.deleteReport = async (id) => {
            if(confirm('هل أنت متأكد من حذف هذا التقرير نهائياً؟')) {
                const { error } = await supabaseClient.from('station_costs').delete().eq('id', id);
                if(!error) loadReports(); else alert("خطأ في الحذف");
            }
        };

        window.closeModal = () => document.getElementById('costModal').classList.remove('active');

        init();
    </script>
</body>
</html>
