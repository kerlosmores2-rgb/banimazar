<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير مرور المدير - بني مزار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #00d4ff; padding-bottom: 15px; }
        .btn { padding: 8px 18px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; font-family: 'Cairo'; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-success { background: #28a745; color: #fff; }
        .btn-danger { background: #dc3545; color: #fff; }

        /* شريط البحث */
        .search-area { margin-bottom: 20px; display: flex; gap: 10px; }
        .search-area input { flex: 1; padding: 10px; border-radius: 10px; border: none; background: #164a63; color: white; }

        /* نموذج التفتيش */
        .inspection-card { background: #164a63; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #00d4ff; }
        .checklist-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e2a3a; border-radius: 10px; overflow: hidden; }
        .checklist-table th, .checklist-table td { padding: 12px; border: 1px solid #ffffff11; text-align: center; }
        
        /* الراديو بوتون (يعمل/لا يعمل) */
        .status-toggle { display: flex; gap: 10px; justify-content: center; }
        .status-toggle label { cursor: pointer; padding: 4px 10px; border-radius: 5px; font-size: 12px; }
        .radio-working:checked + span { background: #28a745; color: white; padding: 2px 8px; border-radius: 5px; }
        .radio-broken:checked + span { background: #dc3545; color: white; padding: 2px 8px; border-radius: 5px; }

        /* جدول التقارير السابقة */
        .reports-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .report-item { background: #164a63; padding: 15px; border-radius: 10px; position: relative; border-right: 5px solid #00d4ff; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal.active { display: flex; justify-content: center; }
        .modal-content { background: #0f3b4f; padding: 25px; border-radius: 20px; width: 100%; max-width: 900px; height: fit-content; }

        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #2c3e50; color: white; font-family: 'Cairo'; }
    </style>
</head>
<body>

    <div class="header-section">
        <h2><i class="fas fa-clipboard-check"></i> تقارير مرور المواقع</h2>
        <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> إضافة تقرير مرور جديد</button>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="بحث باسم المحطة أو المدير..." onkeyup="filterReports()">
    </div>

    <div id="reportsList" class="reports-grid">
        </div>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#00d4ff; margin-bottom:15px;">نموذج معاينة محطة</h3>
            <form id="inspectionForm">
                <input type="hidden" id="editReportId">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div>
                        <label>تاريخ المرور:</label>
                        <input type="date" id="visitDate" required>
                    </div>
                    <div>
                        <label>المحطة:</label>
                        <select id="visitStation" onchange="generateChecklist()" required></select>
                    </div>
                    <div>
                        <label>المدير المسؤول:</label>
                        <select id="visitManager" required></select>
                    </div>
                </div>

                <label>ملاحظات عامة على الموقع:</label>
                <textarea id="generalNotes" rows="2" placeholder="النظافة، الإنارة، الحالة العامة..."></textarea>

                <div id="assetsChecklistArea">
                    <p style="text-align: center; color: #888; padding: 20px;">اختر المحطة أولاً لإظهار قائمة الأصول...</p>
                </div>

                <div style="text-align: left; margin-top: 20px;">
                    <button type="button" class="btn btn-danger" onclick="closeModal()">إغلاق</button>
                    <button type="submit" class="btn btn-success">حفظ التقرير نهائياً</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allAssets = [], allManagers = [], reportsData = [];

        async function init() {
            // جلب المحطات
            const { data: stations } = await supabaseClient.from('stations').select('*');
            const sSelect = document.getElementById('visitStation');
            sSelect.innerHTML = '<option value="">اختر المحطة</option>';
            stations?.forEach(s => sSelect.innerHTML += `<option value="${s.id}">${s.station_name}</option>`);

            // جلب الأصول (من الـ 7 جداول)
            const tables = ['transformers', 'generators', 'electrical_panels', 'main_pumps', 'sub_pumps', 'other_assets', 'buildings'];
            const res = await Promise.all(tables.map(t => supabaseClient.from(t).select('*')));
            allAssets = [];
            res.forEach(r => r.data?.forEach(item => {
                let name = item.asset_name || item.transformer_number || item.generator_number || item.pump_number || "أصل";
                allAssets.push({ name, station_id: item.station_id });
            }));

            // جلب المديرين (من جدول الموظفين)
            const { data: emps } = await supabaseClient.from('employees').select('employee_name');
            const mSelect = document.getElementById('visitManager');
            mSelect.innerHTML = '<option value="">اختر المدير</option>';
            emps?.forEach(e => mSelect.innerHTML += `<option value="${e.employee_name}">${e.employee_name}</option>`);

            loadReports();
        }

        // توليد قائمة الأصول فور اختيار المحطة
        window.generateChecklist = () => {
            const sid = document.getElementById('visitStation').value;
            const filtered = allAssets.filter(a => String(a.station_id) === String(sid));
            
            let html = `<h4>قائمة فحص الأصول (${filtered.length})</h4>
                        <table class="checklist-table">
                            <thead><tr><th>الأصل/المعدة</th><th>الحالة</th><th>ملاحظات فنية</th></tr></thead><tbody>`;
            
            filtered.forEach((a, index) => {
                html += `<tr>
                    <td>${a.name}</td>
                    <td>
                        <div class="status-toggle">
                            <label><input type="radio" name="st_${index}" value="يعمل" checked class="radio-working"> <span>يعمل</span></label>
                            <label><input type="radio" name="st_${index}" value="لا يعمل" class="radio-broken"> <span>عطل</span></label>
                        </div>
                    </td>
                    <td><input type="text" class="asset-note" placeholder="ملاحظة..." style="margin:0; font-size:12px;"></td>
                </tr>`;
            });
            document.getElementById('assetsChecklistArea').innerHTML = html + '</tbody></table>';
        };

        async function loadReports() {
            const { data } = await supabaseClient.from('inspection_reports').select('*').order('visit_date', { ascending: false });
            reportsData = data || [];
            renderReports();
        }

        function renderReports() {
            let html = '';
            reportsData.forEach(r => {
                html += `
                <div class="report-item">
                    <div style="display:flex; justify-content:space-between;">
                        <b>📍 محطة: ${r.station_name}</b>
                        <span>📅 ${r.visit_date}</span>
                    </div>
                    <div style="font-size:13px; color:#00d4ff;">بإشراف المدير: ${r.manager_name}</div>
                    <div style="margin-top:10px; font-size:12px; color:#ccc;">${r.notes || 'لا يوجد ملاحظات عامة'}</div>
                    <div style="margin-top:10px;">
                        <button class="btn btn-primary" style="padding:4px 10px; font-size:11px;" onclick="editReport(${r.id})">تعديل</button>
                        <button class="btn btn-danger" style="padding:4px 10px; font-size:11px;" onclick="deleteReport(${r.id})">حذف</button>
                    </div>
                </div>`;
            });
            document.getElementById('reportsList').innerHTML = html || '<p style="text-align:center;">لا توجد تقارير مسجلة</p>';
        }

        // حفظ التقرير
        document.getElementById('inspectionForm').onsubmit = async (e) => {
            e.preventDefault();
            const sid = document.getElementById('visitStation').value;
            const sName = document.getElementById('visitStation').options[document.getElementById('visitStation').selectedIndex].text;
            
            // جمع بيانات الأصول من الجدول
            const checklist = [];
            const rows = document.querySelectorAll('.checklist-table tbody tr');
            rows.forEach((row, i) => {
                checklist.push({
                    asset: row.cells[0].innerText,
                    status: row.querySelector(`input[name="st_${i}"]:checked`).value,
                    note: row.querySelector('.asset-note').value
                });
            });

            const payload = {
                visit_date: document.getElementById('visitDate').value,
                station_id: sid,
                station_name: sName,
                manager_name: document.getElementById('visitManager').value,
                notes: document.getElementById('generalNotes').value,
                checklist_data: checklist // سيتم حفظها كـ JSON
            };

            const reportId = document.getElementById('editReportId').value;
            let result;
            if(reportId) {
                result = await supabaseClient.from('inspection_reports').update(payload).eq('id', reportId);
            } else {
                result = await supabaseClient.from('inspection_reports').insert([payload]);
            }

            if (!result.error) {
                closeModal();
                loadReports();
            } else {
                alert("خطأ: تأكد من إنشاء جدول inspection_reports في سوبابيز");
            }
        };

        window.openModal = () => {
            document.getElementById('inspectionForm').reset();
            document.getElementById('editReportId').value = '';
            document.getElementById('assetsChecklistArea').innerHTML = '<p style="text-align:center; padding:20px;">اختر المحطة أولاً...</p>';
            document.getElementById('reportModal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('reportModal').classList.remove('active');

        window.deleteReport = async (id) => {
            if(confirm("هل أنت متأكد من حذف هذا التقرير؟")) {
                await supabaseClient.from('inspection_reports').delete().eq('id', id);
                loadReports();
            }
        };

        init();
    </script>
</body>
</html>
