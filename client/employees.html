<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الموظفين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; margin: 5px; }
        .btn-primary { background: #00d4ff; color: #000; font-weight: bold; }
        .btn-danger { background: #dc3545; color: #fff; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #164a63; border-radius: 10px; overflow: hidden; }
        .data-table th, .data-table td { padding: 12px; border-bottom: 1px solid #ffffff22; text-align: center; }
        .data-table th { background: #00d4ff33; color: #00d4ff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1e2a3a; padding: 25px; border-radius: 15px; width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: #2c3e50; color: white; box-sizing: border-box; }
    </style>
</head>

<body>

    <h2>👷 إدارة الموظفين</h2>

    <button class="btn btn-primary" id="addEmployeeBtn">➕ إضافة موظف</button>
    <button class="btn" id="reportBtn" style="background: #28a745; color:white;">📊 تقرير</button>

    <div id="employeesList">جاري التحميل...</div>

    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">بيانات الموظف</h3>
            <form id="employeeForm">
                <input type="hidden" id="employeeId">
                
                <input id="empName" placeholder="الاسم الكامل" required>
                <input id="empCode" placeholder="كود الموظف">

                <label>الوظيفة:</label>
                <select id="empDept" required>
                    <option value="" disabled selected>اختر الوظيفة...</option>
                    <option value="مدير محطة">مدير محطة</option>
                    <option value="مهندس">مهندس</option>
                    <option value="فني">فني</option>
                    <option value="عامل">عامل</option>
                    <option value="إداري">إداري</option>
                    <option value="أمن">أمن</option>
                    <option value="أمين مخزن">أمين مخزن</option>
                    <option value="سائق">سائق</option>
                </select>

                <label>المحطة:</label>
                <select id="empStation" required>
                    <option value="" disabled selected>جاري تحميل المحطات...</option>
                </select>

                <input id="empPhone" placeholder="رقم الهاتف">

                <div style="text-align: left;">
                    <button type="submit" class="btn btn-primary">حفظ</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const supabaseClient = supabase.createClient(
                'https://jvfbkoaeugkeoiccvnkq.supabase.co',
                'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ'
            );

            let employeesData = [];
            let currentEditId = null;

            // 1. وظيفة جلب المحطات من قاعدة البيانات
            async function loadStations() {
                const stationSelect = document.getElementById('empStation');
                // تأكد من أن اسم الجدول 'stations' واسم العمود 'station_name' مطابق للي عندك
                const { data, error } = await supabaseClient.from('stations').select('station_name');
                
                if (error) {
                    stationSelect.innerHTML = '<option value="">خطأ في تحميل المحطات</option>';
                    return;
                }

                stationSelect.innerHTML = '<option value="" disabled selected>اختر المحطة...</option>';
                data.forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s.station_name;
                    opt.text = s.station_name;
                    stationSelect.appendChild(opt);
                });
            }

            async function loadEmployees() {
                const { data, error } = await supabaseClient.from('employees').select('*');
                if (error) { document.getElementById('employeesList').innerHTML = 'خطأ'; return; }
                employeesData = data || [];
                renderTable();
            }

            function renderTable() {
                let html = '<table class="data-table"><tr><th>#</th><th>الاسم</th><th>الوظيفة</th><th>المحطة</th><th>الإجراءات</th></tr>';
                employeesData.forEach((e, i) => {
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td>${e.employee_name}</td>
                        <td>${e.department || '-'}</td>
                        <td>${e.station || '-'}</td>
                        <td>
                            <button class="btn" style="background:#ffc107" onclick="editEmployee(${e.id})">تعديل</button>
                            <button class="btn btn-danger" onclick="deleteEmployee(${e.id})">حذف</button>
                        </td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('employeesList').innerHTML = html;
            }

            // تشغيل الوظائف عند فتح الصفحة
            loadStations(); 
            loadEmployees();

            // بقية الأكواد (إضافة، تعديل، حذف)
            document.getElementById('addEmployeeBtn').onclick = () => {
                currentEditId = null;
                document.getElementById('employeeForm').reset();
                document.getElementById('employeeModal').classList.add('active');
            };

            window.editEmployee = (id) => {
                const e = employeesData.find(x => x.id == id);
                if (!e) return;
                currentEditId = id;
                document.getElementById('empName').value = e.employee_name;
                document.getElementById('empCode').value = e.employee_code || '';
                document.getElementById('empDept').value = e.department || '';
                document.getElementById('empStation').value = e.station || '';
                document.getElementById('empPhone').value = e.phone || '';
                document.getElementById('employeeModal').classList.add('active');
            };

            window.deleteEmployee = async (id) => {
                if (!confirm('حذف؟')) return;
                await supabaseClient.from('employees').delete().eq('id', id);
                loadEmployees();
            };

            document.getElementById('employeeForm').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    employee_name: document.getElementById('empName').value,
                    employee_code: document.getElementById('empCode').value,
                    department: document.getElementById('empDept').value,
                    station: document.getElementById('empStation').value,
                    phone: document.getElementById('empPhone').value
                };

                if (currentEditId) {
                    await supabaseClient.from('employees').update(data).eq('id', currentEditId);
                } else {
                    await supabaseClient.from('employees').insert([data]);
                }
                closeModal();
                loadEmployees();
            };

            window.closeModal = () => document.getElementById('employeeModal').classList.remove('active');
        });
    </script>
</body>
</html>
