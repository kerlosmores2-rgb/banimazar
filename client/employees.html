<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الموظفين</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {font-family: Cairo; background:#0f3b4f; color:#fff; padding:20px;}
.btn {padding:8px 15px; border:none; border-radius:20px; cursor:pointer;}
.btn-primary {background:#00d4ff;}
.btn-danger {background:#dc3545; color:#fff;}
.data-table {width:100%; border-collapse:collapse; margin-top:15px;}
.data-table th,.data-table td{padding:10px; border-bottom:1px solid #444;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000a; justify-content:center; align-items:center;}
.modal.active {display:flex;}
.modal-content{background:#1e2a3a; padding:20px; border-radius:15px; width:400px;}
</style>
</head>

<body>

<h2>👷 إدارة الموظفين</h2>

<button class="btn btn-primary" id="addEmployeeBtn">➕ إضافة موظف</button>
<button class="btn" id="reportBtn">📊 تقرير</button>

<div id="employeesList">جاري التحميل...</div>

<!-- Modal -->
<div id="employeeModal" class="modal">
<div class="modal-content">

<h3 id="modalTitle">موظف</h3>

<form id="employeeForm">
<input type="hidden" id="employeeId">

<input id="empName" placeholder="الاسم"><br><br>
<input id="empCode" placeholder="الكود"><br><br>
<input id="empDept" placeholder="القسم"><br><br>
<input id="empPhone" placeholder="الهاتف"><br><br>

<button class="btn btn-primary">حفظ</button>
<button type="button" onclick="closeModal()">إلغاء</button>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

const supabaseClient = supabase.createClient(
'https://jvfbkoaeugkeoiccvnkq.supabase.co',
'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ'
);

let employeesData = [];
let currentEditId = null;

async function loadEmployees(){
employeesList.innerHTML='جاري التحميل...';

const {data,error} = await supabaseClient.from('employees').select('*');

if(error){ employeesList.innerHTML='خطأ'; return;}

employeesData=data||[];
renderTable();
}

function renderTable(){
if(!employeesData.length){
employeesList.innerHTML='لا يوجد موظفين';
return;
}

let html='<table class="data-table"><tr><th>#</th><th>الاسم</th><th>القسم</th><th>الهاتف</th><th>الإجراءات</th></tr>';

employeesData.forEach((e,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${e.employee_name}</td>
<td>${e.department||'-'}</td>
<td>${e.phone||'-'}</td>
<td>
<button onclick="editEmployee(${e.id})">تعديل</button>
<button onclick="deleteEmployee(${e.id})">حذف</button>
</td>
</tr>`;
});

html+='</table>';
employeesList.innerHTML=html;
}

document.getElementById('addEmployeeBtn').onclick=()=>{
currentEditId=null;
employeeForm.reset();
employeeModal.classList.add('active');
};

window.editEmployee=(id)=>{
const e=employeesData.find(x=>x.id==id);
if(!e) return;

currentEditId=id;

empName.value=e.employee_name;
empCode.value=e.employee_code||'';
empDept.value=e.department||'';
empPhone.value=e.phone||'';

employeeModal.classList.add('active');
};

window.deleteEmployee=async(id)=>{
if(!confirm('حذف؟')) return;

await supabaseClient.from('employees').delete().eq('id',id);
loadEmployees();
};

employeeForm.onsubmit=async(e)=>{
e.preventDefault();

const data={
employee_name:empName.value,
employee_code:empCode.value,
department:empDept.value,
phone:empPhone.value
};

if(currentEditId){
await supabaseClient.from('employees').update(data).eq('id',currentEditId);
}else{
await supabaseClient.from('employees').insert([data]);
}

closeModal();
loadEmployees();
};

window.closeModal=()=>employeeModal.classList.remove('active');

document.getElementById('reportBtn').onclick=async()=>{
const {data}=await supabaseClient.from('maintenance').select('assigned_employee_id');

let count={};

data.forEach(r=>{
if(!r.assigned_employee_id) return;
count[r.assigned_employee_id]=(count[r.assigned_employee_id]||0)+1;
});

let report='📊 تقرير الموظفين\n\n';

employeesData.forEach(e=>{
report+=`${e.employee_name} : ${count[e.id]||0} بلاغ\n`;
});

alert(report);
};

loadEmployees();

});
</script>

</body>
</html>
