<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let employeesData = [];
let stationsList = [];
let currentEditId = null;

// تحميل المحطات
async function loadStations() {
    const { data, error } = await supabaseClient
        .from('stations')
        .select('id, station_name')
        .order('station_name');

    if (error) return;

    stationsList = data;

    const filter = document.getElementById('stationFilter');
    const modal = document.getElementById('empStation');

    filter.innerHTML = '<option value="">كل المحطات</option>';
    modal.innerHTML = '<option value="">بدون محطة</option>';

    data.forEach(s => {
        filter.innerHTML += `<option value="${s.id}">${s.station_name}</option>`;
        modal.innerHTML += `<option value="${s.id}">${s.station_name}</option>`;
    });
}

// تحميل الموظفين
async function loadEmployees() {
    document.getElementById('employeesList').innerHTML = 'جاري التحميل...';

    let query = supabaseClient.from('employees').select('*');

    const station = stationFilter.value;
    const dept = deptFilter.value;
    const status = statusFilter.value;

    if (station) query = query.eq('station_id', station);
    if (dept) query = query.eq('department', dept);
    if (status) query = query.eq('status', status);

    const { data, error } = await query.order('id', { ascending: false });

    if (error) {
        employeesList.innerHTML = 'خطأ في التحميل';
        return;
    }

    employeesData = data || [];
    renderTable();
}

// عرض الجدول
function renderTable() {
    const container = document.getElementById('employeesList');

    if (!employeesData.length) {
        container.innerHTML = '<div class="no-data">لا يوجد موظفين</div>';
        return;
    }

    let html = `
    <table class="data-table">
    <thead>
    <tr>
        <th>#</th>
        <th>الاسم</th>
        <th>الكود</th>
        <th>المحطة</th>
        <th>القسم</th>
        <th>الوظيفة</th>
        <th>الهاتف</th>
        <th>الحالة</th>
        <th>الإجراءات</th>
    </tr>
    </thead>
    <tbody>`;

    employeesData.forEach((e, i) => {
        const station = stationsList.find(s => s.id == e.station_id);

        html += `
        <tr>
            <td>${i+1}</td>
            <td>${e.employee_name}</td>
            <td>${e.employee_code || '-'}</td>
            <td>${station?.station_name || '-'}</td>
            <td>${e.department || '-'}</td>
            <td>${e.job_title || '-'}</td>
            <td>${e.phone || '-'}</td>
            <td>${e.status || '-'}</td>
            <td>
                <button class="btn btn-sm btn-primary" onclick="editEmployee(${e.id})">تعديل</button>
                <button class="btn btn-sm btn-danger" onclick="deleteEmployeeRow(${e.id})">حذف</button>
            </td>
        </tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
}

// إضافة
document.getElementById('addEmployeeBtn').onclick = () => {
    currentEditId = null;
    employeeForm.reset();
    employeeId.value = '';
    modalTitle.innerText = 'إضافة موظف';
    employeeModal.classList.add('active');
};

// تعديل
window.editEmployee = (id) => {
    const e = employeesData.find(x => x.id == id);
    if (!e) return;

    currentEditId = id;

    employeeId.value = e.id;
    empName.value = e.employee_name;
    empCode.value = e.employee_code || '';
    empStation.value = e.station_id || '';
    empDept.value = e.department || '';
    empJob.value = e.job_title || '';
    empPhone.value = e.phone || '';
    empEmail.value = e.email || '';
    empHireDate.value = e.hire_date || '';
    empStatus.value = e.status || 'active';
    empNotes.value = e.notes || '';

    modalTitle.innerText = 'تعديل موظف';
    employeeModal.classList.add('active');
};

// حذف
window.deleteEmployeeRow = async (id) => {
    if (!confirm('حذف الموظف؟')) return;

    const { error } = await supabaseClient
        .from('employees')
        .delete()
        .eq('id', id);

    if (!error) loadEmployees();
};

// حفظ
employeeForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
        employee_name: empName.value,
        employee_code: empCode.value,
        station_id: empStation.value || null,
        department: empDept.value,
        job_title: empJob.value,
        phone: empPhone.value,
        email: empEmail.value,
        hire_date: empHireDate.value,
        status: empStatus.value,
        notes: empNotes.value
    };

    if (currentEditId) {
        await supabaseClient.from('employees').update(data).eq('id', currentEditId);
    } else {
        await supabaseClient.from('employees').insert([data]);
    }

    closeEmployeeModal();
    loadEmployees();
});

// فلاتر
filterBtn.onclick = loadEmployees;

// تشغيل
loadStations();
loadEmployees();
    
</script>
