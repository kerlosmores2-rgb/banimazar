<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>المحطات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: transparent;
            color: #fff;
            padding: 15px;
        }
        .stations-container {
            width: 100%;
            max-width: 100%;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0,212,255,0.3);
            flex-wrap: wrap;
            gap: 15px;
        }
        .page-header h2 {
            color: #00d4ff;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .btn-primary {
            background: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0,212,255,0.3);
        }
        .btn-primary:hover {
            background: #00c4e8;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 12px 10px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            vertical-align: top;
            word-break: break-word;
            white-space: normal;
        }
        .data-table th {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            font-weight: 600;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status-active { background: rgba(40,167,69,0.2); color: #28a745; }
        .status-maintenance { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-inactive { background: rgba(108,117,125,0.2); color: #adb5bd; }
        .status-emergency { background: rgba(220,53,69,0.2); color: #dc3545; }
        
        /* تنسيق المودال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e2a3a;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-header h3 {
            color: #00d4ff;
        }
        .modal-close {
            font-size: 1.8rem;
            cursor: pointer;
            color: #dc3545;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #00d4ff;
        }
        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
        }
        .form-group small {
            display: block;
            margin-top: 5px;
            color: #aaa;
            font-size: 0.7rem;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 25px;
        }
        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: #00d4ff;
        }
        .no-data {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }
        .table-responsive {
            overflow-x: auto;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .data-table th, .data-table td {
                padding: 8px 6px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div class="stations-container">
    <div class="page-header">
        <h2><i class="fas fa-building"></i> إدارة المحطات</h2>
        <button class="btn btn-primary" id="addStationBtn">
            <i class="fas fa-plus"></i> إضافة محطة جديدة
        </button>
    </div>

    <div id="stationsList">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>جاري تحميل البيانات...</p>
        </div>
    </div>
</div>

<div id="stationModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">إضافة محطة جديدة</h3>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <form id="stationForm">
            <input type="hidden" id="stationId">
            
            <div class="form-group">
                <label>اسم المحطة <span style="color:#dc3545;">*</span></label>
                <input type="text" id="stationName" required placeholder="مثال: محطة بني مزار المركزية">
            </div>
            
            <div class="form-group">
                <label>كود المحطة</label>
                <input type="text" id="stationCode" placeholder="مثال: ST-001">
            </div>
            
            <div class="form-group">
                <label>نوع المحطة</label>
                <select id="stationType">
                    <option value="معالجة">🏭 معالجة</option>
                    <option value="رئيسية">🏢 رئيسية</option>
                    <option value="فرعية">🏘️ فرعية</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>المصب</label>
                <select id="downstreamStationId">
                    <option value="">-- اختر محطة المصب --</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>موقع المحطة</label>
                <input type="text" id="stationLocation" placeholder="مثال: بني مزار بجوار مسجد الرحمة">
            </div>
            
            <div class="form-group">
                <label>منطقة الخدمة</label>
                <input type="text" id="serviceArea" placeholder="مثال: شرق المحطة ومنطقة الرحمة">
            </div>
            
            <div class="form-group">
                <label>الطاقة التصميمية (م³/ساعة)</label>
                <input type="number" id="stationCapacity" step="0.01" placeholder="مثال: 500">
            </div>

            <div style="background: rgba(0,212,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 18px; border: 1px dashed rgba(0,212,255,0.3);">
                <div class="form-group">
                    <label>خط الطرد: القطر (مم) | الطول (م) | نوع الخط</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="pipeDiameter" placeholder="القطر مم">
                        <input type="number" id="pipeLength" placeholder="الطول م">
                        <input type="text" id="pipeType" placeholder="نوع الخط">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>البيارة: قطر البيارة (م) | عمق البيارة (م) | قطر الدخول (مم)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="wellDiameter" step="0.1" placeholder="قطر م">
                        <input type="number" id="wellDepth" step="0.1" placeholder="عمق م">
                        <input type="number" id="inletDiameter" placeholder="دخول مم">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>شبكة الانحدار (كم)</label>
                    <input type="number" id="sewageNetwork" step="0.01" placeholder="كم">
                </div>
            </div>

            <div class="form-group">
                <label>الحالة</label>
                <select id="stationStatus">
                    <option value="active">✅ نشطة</option>
                    <option value="maintenance">🔧 تحت الصيانة</option>
                    <option value="inactive">⭕ متوقفة</option>
                    <option value="emergency">⚠️ طوارئ</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>ملاحظات</label>
                <textarea id="stationNotes" rows="3" placeholder="أي ملاحظات إضافية عن المحطة..."></textarea>
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn" onclick="closeModal()" style="background:#6c757d;">إلغاء</button>
                <button type="submit" class="btn btn-primary">💾 حفظ</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let stationsData = [];
    const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
    const addBtn = document.getElementById('addStationBtn');
    if (user.role === 'viewer') if (addBtn) addBtn.style.display = 'none';

    async function getStationsDirect() {
        try {
            const { data, error } = await supabaseClient.from('stations').select('*').order('station_name');
            if (error) throw error;
            return { success: true, stations: data || [] };
        } catch (error) { return { success: false, message: error.message, stations: [] }; }
    }

    async function createStationDirect(data) {
        try {
            const { data: result, error } = await supabaseClient.from('stations').insert([data]).select();
            if (error) throw error;
            return { success: true, data: result[0], message: '✅ تم إضافة المحطة بنجاح' };
        } catch (error) { return { success: false, message: error.message }; }
    }

    async function updateStationDirect(id, data) {
        try {
            const { data: result, error } = await supabaseClient.from('stations').update(data).eq('id', id).select();
            if (error) throw error;
            return { success: true, data: result[0], message: '✅ تم تحديث المحطة بنجاح' };
        } catch (error) { return { success: false, message: error.message }; }
    }

    async function deleteStationDirect(id) {
        try {
            const { error } = await supabaseClient.from('stations').delete().eq('id', id);
            if (error) throw error;
            return { success: true, message: '✅ تم حذف المحطة بنجاح' };
        } catch (error) { return { success: false, message: error.message }; }
    }

    function loadDownstreamStations() {
        const select = document.getElementById('downstreamStationId');
        if (!select) return;
        const currentId = document.getElementById('stationId').value;
        select.innerHTML = '<option value="">-- اختر محطة المصب --</option>';
        stationsData.forEach(station => {
            if (currentId && station.id == currentId) return;
            select.innerHTML += `<option value="${station.id}">${station.station_name} (${station.station_code || ''})</option>`;
        });
    }

    async function loadStations() {
        const container = document.getElementById('stationsList');
        container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p>جاري تحميل البيانات...</p></div>';
        const result = await getStationsDirect();
        if (result.success) {
            stationsData = result.stations;
            loadDownstreamStations();
            if (stationsData.length === 0) {
                let html = '<div class="no-data"><i class="fas fa-database"></i><p>لا توجد محطات مسجلة</p>';
                if (user.role !== 'viewer') html += '<button class="btn btn-primary" onclick="document.getElementById(\'addStationBtn\').click()" style="margin-top:15px;"><i class="fas fa-plus"></i> إضافة أول محطة</button>';
                container.innerHTML = html + '</div>';
            } else { renderTable(); }
        } else { container.innerHTML = '<div class="no-data">خطأ: ' + result.message + '</div>'; }
    }

    function renderTable() {
        let html = '<div class="table-responsive"><table class="data-table"><thead><tr>' +
            '<th>#</th><th>اسم المحطة</th><th>الكود</th><th>النوع</th><th>المصب</th><th>الموقع</th><th>منطقة الخدمة</th><th>الطاقة (م³/س)</th><th>الحالة</th><th>الإجراءات</th>' +
            '</tr></thead><tbody>';
        stationsData.forEach((s, i) => {
            let statusClass = s.status === 'maintenance' ? 'status-maintenance' : s.status === 'inactive' ? 'status-inactive' : s.status === 'emergency' ? 'status-emergency' : 'status-active';
            let typeIcon = s.station_type === 'معالجة' ? '🏭 ' : s.station_type === 'رئيسية' ? '🏢 ' : '🏘️ ';
            const ds = stationsData.find(st => st.id == s.downstream_station_id);
            html += `<tr><td>${i+1}</td><td><i class="fas fa-water"></i> ${s.station_name || '---'}</td><td>${s.station_code || '---'}</td><td>${typeIcon}${s.station_type || '---'}</td><td>${ds ? ds.station_name : '---'}</td><td>${s.location || '---'}</td><td>${s.service_area || '---'}</td><td>${s.capacity ? s.capacity + ' م³/س' : '---'}</td><td><span class="status-badge ${statusClass}">${s.status}</span></td><td class="action-buttons">`;
            if (user.role !== 'viewer') {
                html += `<button class="btn btn-sm btn-primary" onclick="editStation(${s.id})"><i class="fas fa-edit"></i> عرض</button><button class="btn btn-sm btn-danger" onclick="deleteStation(${s.id})"><i class="fas fa-trash"></i> حذف</button>`;
            } else { html += '<span class="status-badge" style="background:rgba(0,212,255,0.1);">عرض فقط</span>'; }
            html += '</td></tr>';
        });
        document.getElementById('stationsList').innerHTML = html + '</tbody></table></div>';
    }

    function closeModal() { document.getElementById('stationModal').classList.remove('active'); }
    window.closeModal = closeModal;

    document.getElementById('addStationBtn').addEventListener('click', () => {
        if (user.role === 'viewer') return alert('⚠️ ليس لديك صلاحية');
        document.getElementById('stationForm').reset();
        document.getElementById('stationId').value = '';
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة محطة جديدة';
        loadDownstreamStations();
        document.getElementById('stationModal').classList.add('active');
    });

    document.getElementById('stationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('stationId').value;
        const data = {
            station_name: document.getElementById('stationName').value,
            station_code: document.getElementById('stationCode').value,
            station_type: document.getElementById('stationType').value,
            downstream_station_id: document.getElementById('downstreamStationId').value || null,
            location: document.getElementById('stationLocation').value,
            service_area: document.getElementById('serviceArea').value,
            capacity: parseFloat(document.getElementById('stationCapacity').value) || 0,
            status: document.getElementById('stationStatus').value,
            notes: document.getElementById('stationNotes').value,
            // الحقول الإضافية
            pipe_diameter: document.getElementById('pipeDiameter').value,
            pipe_length: document.getElementById('pipeLength').value,
            pipe_type: document.getElementById('pipeType').value,
            well_diameter: document.getElementById('wellDiameter').value,
            well_depth: document.getElementById('wellDepth').value,
            inlet_diameter: document.getElementById('inletDiameter').value,
            sewage_network: document.getElementById('sewageNetwork').value,
            updated_at: new Date().toISOString()
        };
        if (!id) data.created_at = new Date().toISOString();

        let result = id ? await updateStationDirect(id, data) : await createStationDirect(data);
        if (result.success) { closeModal(); loadStations(); if (window.parent?.showToast) window.parent.showToast(result.message); }
        else alert('❌ ' + result.message);
    });

    window.editStation = function(id) {
        const s = stationsData.find(st => st.id == id);
        if (s) {
            document.getElementById('stationId').value = s.id;
            document.getElementById('stationName').value = s.station_name || '';
            document.getElementById('stationCode').value = s.station_code || '';
            document.getElementById('stationType').value = s.station_type || 'معالجة';
            document.getElementById('stationLocation').value = s.location || '';
            document.getElementById('serviceArea').value = s.service_area || '';
            document.getElementById('stationCapacity').value = s.capacity || '';
            document.getElementById('stationStatus').value = s.status || 'active';
            document.getElementById('stationNotes').value = s.notes || '';
            // ملء الحقول الإضافية عند التعديل
            document.getElementById('pipeDiameter').value = s.pipe_diameter || '';
            document.getElementById('pipeLength').value = s.pipe_length || '';
            document.getElementById('pipeType').value = s.pipe_type || '';
            document.getElementById('wellDiameter').value = s.well_diameter || '';
            document.getElementById('wellDepth').value = s.well_depth || '';
            document.getElementById('inletDiameter').value = s.inlet_diameter || '';
            document.getElementById('sewageNetwork').value = s.sewage_network || '';
            
            loadDownstreamStations();
            setTimeout(() => { document.getElementById('downstreamStationId').value = s.downstream_station_id || ''; }, 100);
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل محطة';
            document.getElementById('stationModal').classList.add('active');
        }
    };

    window.deleteStation = function(id) {
        if (confirm('⚠️ هل أنت متأكد؟')) deleteStationDirect(id).then(r => { if (r.success) loadStations(); });
    };

    loadStations();
</script>
</body>
</html>
