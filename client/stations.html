<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>المحطات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: transparent;
            color: #fff;
            padding: 15px;
        }
        .stations-container {
            width: 100%;
            max-width: 100%;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0,212,255,0.3);
            flex-wrap: wrap;
            gap: 15px;
        }
        .page-header h2 {
            color: #00d4ff;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .btn-primary {
            background: #00d4ff;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0,212,255,0.3);
        }
        .btn-primary:hover {
            background: #00c4e8;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 14px 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .data-table th {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status-active { background: rgba(40,167,69,0.2); color: #28a745; }
        .status-maintenance { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-inactive { background: rgba(108,117,125,0.2); color: #adb5bd; }
        .status-emergency { background: rgba(220,53,69,0.2); color: #dc3545; }
        
        /* تنسيق المودال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e2a3a;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .modal-header h3 {
            color: #00d4ff;
        }
        .modal-close {
            font-size: 1.8rem;
            cursor: pointer;
            color: #dc3545;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #00d4ff;
        }
        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
        }
        .form-group small {
            display: block;
            margin-top: 5px;
            color: #aaa;
            font-size: 0.7rem;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 25px;
        }
        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: #00d4ff;
        }
        .no-data {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }
        .table-responsive {
            overflow-x: auto;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="stations-container">
    <div class="page-header">
        <h2><i class="fas fa-building"></i> إدارة المحطات</h2>
        <button class="btn btn-primary" id="addStationBtn">
            <i class="fas fa-plus"></i> إضافة محطة جديدة
        </button>
    </div>

    <div id="stationsList">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>جاري تحميل البيانات...</p>
        </div>
    </div>
</div>

<!-- المودال (النافذة المنبثقة) -->
<div id="stationModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">إضافة محطة جديدة</h3>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <form id="stationForm">
            <input type="hidden" id="stationId">
            
            <!-- 1. اسم المحطة -->
            <div class="form-group">
                <label>اسم المحطة <span style="color:#dc3545;">*</span></label>
                <input type="text" id="stationName" required placeholder="مثال: محطة بني مزار المركزية">
            </div>
            
            <!-- 2. كود المحطة -->
            <div class="form-group">
                <label>كود المحطة</label>
                <input type="text" id="stationCode" placeholder="مثال: ST-001">
            </div>
            
            <!-- 3. الطاقة التصميمية للمحطة (متر³/ساعة) -->
            <div class="form-group">
                <label>الطاقة التصميمية للمحطة (م³/ساعة)</label>
                <input type="number" id="stationCapacity" step="0.01" placeholder="مثال: 500">
            </div>
            
            <!-- 4. المصب (قائمة منسدلة من المحطات المسجلة) -->
            <div class="form-group">
                <label>المصب</label>
                <select id="downstreamStationId">
                    <option value="">-- اختر محطة المصب --</option>
                </select>
                <small>اختر المحطة التي تذهب إليها المياه بعد المعالجة</small>
            </div>
            
            <!-- 5. الموقع الجغرافي -->
            <div class="form-group">
                <label>الموقع الجغرافي</label>
                <input type="text" id="stationLocation" placeholder="مثال: 28.5000° N, 30.6667° E أو بني مزار - المنيا">
            </div>
            
            <!-- 6. منطقة الخدمة -->
            <div class="form-group">
                <label>منطقة الخدمة</label>
                <input type="text" id="serviceArea" placeholder="مثال: بني مزار، دلجا، أبو جرج">
            </div>
            
            <!-- 7. الحالة -->
            <div class="form-group">
                <label>الحالة</label>
                <select id="stationStatus">
                    <option value="active">✅ نشطة</option>
                    <option value="maintenance">🔧 تحت الصيانة</option>
                    <option value="inactive">⭕ متوقفة</option>
                    <option value="emergency">⚠️ طوارئ</option>
                </select>
            </div>
            
            <!-- 8. ملاحظات -->
            <div class="form-group">
                <label>ملاحظات</label>
                <textarea id="stationNotes" rows="3" placeholder="أي ملاحظات إضافية عن المحطة..."></textarea>
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn" onclick="closeModal()" style="background:#6c757d;">إلغاء</button>
                <button type="submit" class="btn btn-primary">💾 حفظ</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ========== إعدادات Supabase ==========
    const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let stationsData = [];

    // ========== صلاحيات المستخدم ==========
    const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
    const addBtn = document.getElementById('addStationBtn');
    
    if (user.role === 'viewer') {
        if (addBtn) addBtn.style.display = 'none';
    }

    // ========== دوال API ==========
    async function getStationsDirect() {
        try {
            const { data, error } = await supabaseClient
                .from('stations')
                .select('*')
                .order('station_name');
            if (error) throw error;
            return { success: true, stations: data || [] };
        } catch (error) {
            return { success: false, message: error.message, stations: [] };
        }
    }

    async function createStationDirect(data) {
        try {
            const newStation = {
                station_name: data.station_name,
                station_code: data.station_code || null,
                capacity: parseFloat(data.capacity) || null,
                downstream_station_id: data.downstream_station_id || null,
                location: data.location || null,
                service_area: data.service_area || null,
                status: data.status || 'active',
                notes: data.notes || null,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            const { data: result, error } = await supabaseClient
                .from('stations')
                .insert([newStation])
                .select();
            if (error) throw error;
            return { success: true, data: result[0], message: '✅ تم إضافة المحطة بنجاح' };
        } catch (error) {
            return { success: false, message: error.message };
        }
    }

    async function updateStationDirect(id, data) {
        try {
            const updateData = {
                station_name: data.station_name,
                station_code: data.station_code || null,
                capacity: parseFloat(data.capacity) || null,
                downstream_station_id: data.downstream_station_id || null,
                location: data.location || null,
                service_area: data.service_area || null,
                status: data.status || 'active',
                notes: data.notes || null,
                updated_at: new Date().toISOString()
            };
            const { data: result, error } = await supabaseClient
                .from('stations')
                .update(updateData)
                .eq('id', id)
                .select();
            if (error) throw error;
            return { success: true, data: result[0], message: '✅ تم تحديث المحطة بنجاح' };
        } catch (error) {
            return { success: false, message: error.message };
        }
    }

    async function deleteStationDirect(id) {
        try {
            const { error } = await supabaseClient
                .from('stations')
                .delete()
                .eq('id', id);
            if (error) throw error;
            return { success: true, message: '✅ تم حذف المحطة بنجاح' };
        } catch (error) {
            return { success: false, message: error.message };
        }
    }

    // ========== ملء قائمة محطات المصب ==========
    function loadDownstreamStations() {
        const select = document.getElementById('downstreamStationId');
        if (!select) return;
        
        const currentId = document.getElementById('stationId').value;
        
        select.innerHTML = '<option value="">-- اختر محطة المصب --</option>';
        
        stationsData.forEach(station => {
            if (currentId && station.id == currentId) return;
            select.innerHTML += `<option value="${station.id}">${station.station_name} (${station.station_code || ''})</option>`;
        });
    }

    // ========== عرض البيانات ==========
    async function loadStations() {
        const container = document.getElementById('stationsList');
        container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p>جاري تحميل البيانات...</p></div>';
        
        const result = await getStationsDirect();
        if (result.success) {
            stationsData = result.stations;
            loadDownstreamStations();
            
            if (stationsData.length === 0) {
                let html = '<div class="no-data"><i class="fas fa-database"></i><p>لا توجد محطات مسجلة</p>';
                if (user.role !== 'viewer') {
                    html += '<button class="btn btn-primary" onclick="document.getElementById(\'addStationBtn\').click()" style="margin-top:15px;"><i class="fas fa-plus"></i> إضافة أول محطة</button>';
                }
                html += '</div>';
                container.innerHTML = html;
            } else {
                renderTable();
            }
        } else {
            container.innerHTML = '<div class="no-data">خطأ: ' + result.message + '</div>';
        }
    }

    function renderTable() {
        let html = '<div class="table-responsive"><table class="data-table"><thead>发展' +
            '<th>#</th>' +
            '<th>اسم المحطة</th>' +
            '<th>الكود</th>' +
            '<th>الطاقة (م³/س)</th>' +
            '<th>المصب</th>' +
            '<th>الموقع الجغرافي</th>' +
            '<th>منطقة الخدمة</th>' +
            '<th>الحالة</th>' +
            '<th>الإجراءات</th>' +
            '</thead><tbody>';
        
        for (let i = 0; i < stationsData.length; i++) {
            const s = stationsData[i];
            
            let statusClass = 'status-active';
            let statusText = 'نشطة';
            if (s.status === 'maintenance') { statusClass = 'status-maintenance'; statusText = 'صيانة'; }
            else if (s.status === 'inactive') { statusClass = 'status-inactive'; statusText = 'متوقفة'; }
            else if (s.status === 'emergency') { statusClass = 'status-emergency'; statusText = 'طوارئ'; }
            
            // اسم محطة المصب
            let downstreamName = '---';
            if (s.downstream_station_id) {
                const downstream = stationsData.find(st => st.id == s.downstream_station_id);
                downstreamName = downstream ? downstream.station_name : 'غير معروف';
            }
            
            html += '发展' +
                '发展' + (i+1) + '发展' +
                '发展<i class="fas fa-water"></i> ' + (s.station_name || '---') + '发展' +
                '发展' + (s.station_code || '---') + '发展' +
                '发展' + (s.capacity || 0) + '发展' +
                '发展' + downstreamName + '发展' +
                '发展' + (s.location || '---') + '发展' +
                '发展' + (s.service_area || '---') + '发展' +
                '发展<span class="status-badge ' + statusClass + '">' + statusText + '</span>发展' +
                '<td class="action-buttons">';
            
            if (user.role !== 'viewer') {
                html += '<button class="btn btn-sm btn-primary" onclick="editStation(' + s.id + ')"><i class="fas fa-edit"></i> تعديل</button>';
                html += '<button class="btn btn-sm btn-danger" onclick="deleteStation(' + s.id + ')"><i class="fas fa-trash"></i> حذف</button>';
            } else {
                html += '<span class="status-badge" style="background:rgba(0,212,255,0.1);">عرض فقط</span>';
            }
            
            html += '发展</tr>';
        }
        html += '</tbody></table></div>';
        document.getElementById('stationsList').innerHTML = html;
    }

    // ========== دوال المودال ==========
    function closeModal() {
        document.getElementById('stationModal').classList.remove('active');
    }
    window.closeModal = closeModal;

    // ========== فتح المودال لإضافة جديدة ==========
    document.getElementById('addStationBtn').addEventListener('click', function() {
        if (user.role === 'viewer') {
            alert('⚠️ ليس لديك صلاحية للإضافة');
            return;
        }
        document.getElementById('stationForm').reset();
        document.getElementById('stationId').value = '';
        document.getElementById('stationStatus').value = 'active';
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة محطة جديدة';
        loadDownstreamStations();
        document.getElementById('stationModal').classList.add('active');
    });

    // ========== حفظ البيانات ==========
    document.getElementById('stationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const id = document.getElementById('stationId').value;
        const data = {
            station_name: document.getElementById('stationName').value,
            station_code: document.getElementById('stationCode').value,
            capacity: parseFloat(document.getElementById('stationCapacity').value) || 0,
            downstream_station_id: document.getElementById('downstreamStationId').value || null,
            location: document.getElementById('stationLocation').value,
            service_area: document.getElementById('serviceArea').value,
            status: document.getElementById('stationStatus').value,
            notes: document.getElementById('stationNotes').value
        };
        
        if (!data.station_name) {
            alert('⚠️ الرجاء إدخال اسم المحطة');
            return;
        }
        
        let result;
        if (id) {
            result = await updateStationDirect(id, data);
        } else {
            result = await createStationDirect(data);
        }
        
        if (result.success) {
            closeModal();
            loadStations();
            if (window.parent && window.parent.showToast) {
                window.parent.showToast(result.message);
            }
        } else {
            alert('❌ ' + result.message);
        }
    });

    // ========== تعديل محطة ==========
    window.editStation = function(id) {
        if (user.role === 'viewer') {
            alert('⚠️ ليس لديك صلاحية للتعديل');
            return;
        }
        const station = stationsData.find(s => s.id == id);
        if (station) {
            document.getElementById('stationId').value = station.id;
            document.getElementById('stationName').value = station.station_name;
            document.getElementById('stationCode').value = station.station_code || '';
            document.getElementById('stationCapacity').value = station.capacity || '';
            document.getElementById('stationLocation').value = station.location || '';
            document.getElementById('serviceArea').value = station.service_area || '';
            document.getElementById('stationStatus').value = station.status || 'active';
            document.getElementById('stationNotes').value = station.notes || '';
            
            loadDownstreamStations();
            if (station.downstream_station_id) {
                document.getElementById('downstreamStationId').value = station.downstream_station_id;
            }
            
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل محطة';
            document.getElementById('stationModal').classList.add('active');
        }
    };

    // ========== حذف محطة ==========
    window.deleteStation = function(id) {
        if (user.role === 'viewer') {
            alert('⚠️ ليس لديك صلاحية للحذف');
            return;
        }
        if (confirm('⚠️ هل أنت متأكد من حذف هذه المحطة؟')) {
            deleteStationDirect(id).then(result => {
                if (result.success) {
                    loadStations();
                    if (window.parent && window.parent.showToast) window.parent.showToast(result.message);
                } else {
                    alert(result.message);
                }
            });
        }
    };

    // بدء التحميل
    loadStations();
</script>
</body>
</html>
