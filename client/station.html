<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>المحطات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tahoma', 'Segoe UI', sans-serif;
            background: transparent;
            color: #fff;
            padding: 0;
            margin: 0;
        }

        /* تنسيقات المحتوى فقط */
        .stations-container {
            width: 100%;
            padding: 0;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header h2 {
            color: #00d4ff;
            font-size: 1.3rem;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .btn-primary {
            background: #00d4ff;
            color: #1a1a2e;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 0.7rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: block;
            overflow-x: auto;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }

        .data-table th {
            background: rgba(0,212,255,0.15);
            color: #00d4ff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .status-active { background: rgba(40,167,69,0.2); color: #28a745; }
        .status-maintenance { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-inactive { background: rgba(108,117,125,0.2); color: #adb5bd; }
        .status-emergency { background: rgba(220,53,69,0.2); color: #dc3545; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e2a3a;
            border-radius: 20px;
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header h3 {
            color: #00d4ff;
        }

        .modal-close {
            font-size: 1.5rem;
            cursor: pointer;
            color: #dc3545;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: #00d4ff;
        }

        .no-data {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }

        @media (max-width: 768px) {
            .data-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

<div class="stations-container">
    <div class="page-header">
        <h2><i class="fas fa-building"></i> إدارة المحطات</h2>
        <button class="btn btn-primary" id="addStationBtn"><i class="fas fa-plus"></i> إضافة محطة جديدة</button>
    </div>

    <div id="stationsList">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>جاري تحميل البيانات...</p>
        </div>
    </div>
</div>

<!-- Modal إضافة/تعديل محطة -->
<div id="stationModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">إضافة محطة جديدة</h3>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <form id="stationForm">
            <input type="hidden" id="stationId">
            <div class="form-group">
                <label>اسم المحطة <span style="color:#dc3545;">*</span></label>
                <input type="text" id="stationName" required>
            </div>
            <div class="form-group">
                <label>كود المحطة</label>
                <input type="text" id="stationCode">
            </div>
            <div class="form-group">
                <label>الموقع</label>
                <input type="text" id="stationLocation">
            </div>
            <div class="form-group">
                <label>السعة (م³/يوم)</label>
                <input type="number" id="stationCapacity" step="0.01">
            </div>
            <div class="form-group">
                <label>الحالة</label>
                <select id="stationStatus">
                    <option value="active">نشطة</option>
                    <option value="maintenance">تحت الصيانة</option>
                    <option value="inactive">متوقفة</option>
                    <option value="emergency">طوارئ</option>
                </select>
            </div>
            <div class="form-group">
                <label>ملاحظات</label>
                <textarea id="stationNotes" rows="3"></textarea>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn" onclick="closeModal()">إلغاء</button>
                <button type="submit" class="btn btn-primary">حفظ</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/api.js"></script>
<script>
    // التحقق من تسجيل الدخول
    if (typeof checkAuth === 'function' && !checkAuth()) {
        // إذا كان داخل iframe، نوجه الصفحة الرئيسية
        if (window.parent !== window) {
            window.parent.location.href = 'index.html';
        } else {
            window.location.href = 'index.html';
        }
        return;
    }

    // عرض اسم المستخدم إذا كان متاحاً
    if (typeof currentUser !== 'undefined' && currentUser && document.getElementById('userName')) {
        document.getElementById('userName').innerText = currentUser.full_name || currentUser.username;
    }

    let stationsData = [];

    async function loadStations() {
        const container = document.getElementById('stationsList');
        try {
            const result = await getStations();
            if (result.success) {
                stationsData = result.stations;
                renderStationsTable();
            } else {
                container.innerHTML = `<div class="no-data"><i class="fas fa-exclamation-circle"></i> ${result.message}</div>`;
            }
        } catch (error) {
            console.error('Error loading stations:', error);
            container.innerHTML = `<div class="no-data"><i class="fas fa-exclamation-circle"></i> خطأ في تحميل البيانات: ${error.message}</div>`;
        }
    }

    function renderStationsTable() {
        const container = document.getElementById('stationsList');
        if (!stationsData.length) {
            container.innerHTML = `<div class="no-data"><i class="fas fa-database"></i> لا توجد محطات مسجلة</div>`;
            return;
        }
        let html = `<div style="overflow-x: auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th><th>اسم المحطة</th><th>الكود</th><th>الموقع</th><th>السعة</th><th>الحالة</th><th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody>`;
        stationsData.forEach((s, i) => {
            let statusClass = '';
            let statusText = '';
            if (s.status === 'active') { statusClass = 'status-active'; statusText = 'نشطة'; }
            else if (s.status === 'maintenance') { statusClass = 'status-maintenance'; statusText = 'صيانة'; }
            else if (s.status === 'inactive') { statusClass = 'status-inactive'; statusText = 'متوقفة'; }
            else if (s.status === 'emergency') { statusClass = 'status-emergency'; statusText = 'طوارئ'; }
            else { statusClass = 'status-active'; statusText = 'نشطة'; }
            
            html += `<tr>
                <td>${i+1}</td>
                <td><i class="fas fa-water"></i> ${s.station_name}</td>
                <td>${s.station_code || '---'}</td>
                <td>${s.location || '---'}</td>
                <td>${s.capacity || 0} م³/يوم</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="editStation(${s.id})"><i class="fas fa-edit"></i> تعديل</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteStation(${s.id})"><i class="fas fa-trash"></i> حذف</button>
                </td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function openModal(isEdit = false) {
        document.getElementById('stationModal').classList.add('active');
        if (!isEdit) {
            document.getElementById('modalTitle').innerText = 'إضافة محطة جديدة';
            document.getElementById('stationForm').reset();
            document.getElementById('stationId').value = '';
        }
    }

    function closeModal() {
        document.getElementById('stationModal').classList.remove('active');
    }

    async function saveStation(event) {
        event.preventDefault();
        const id = document.getElementById('stationId').value;
        const data = {
            station_name: document.getElementById('stationName').value,
            station_code: document.getElementById('stationCode').value,
            location: document.getElementById('stationLocation').value,
            capacity: parseFloat(document.getElementById('stationCapacity').value) || 0,
            status: document.getElementById('stationStatus').value,
            notes: document.getElementById('stationNotes').value
        };
        try {
            let result;
            if (id) {
                result = await updateStation(id, data);
            } else {
                result = await createStation(data);
            }
            if (result.success) {
                closeModal();
                loadStations();
                // إظهار رسالة نجاح
                if (window.parent && window.parent.showToast) {
                    window.parent.showToast(result.message);
                }
            } else {
                alert(result.message || 'حدث خطأ');
            }
        } catch (error) {
            console.error('Error saving station:', error);
            alert('خطأ في الاتصال بالخادم: ' + error.message);
        }
    }

    window.editStation = async (id) => {
        const station = stationsData.find(s => s.id == id);
        if (station) {
            document.getElementById('stationId').value = station.id;
            document.getElementById('stationName').value = station.station_name;
            document.getElementById('stationCode').value = station.station_code || '';
            document.getElementById('stationLocation').value = station.location || '';
            document.getElementById('stationCapacity').value = station.capacity || '';
            document.getElementById('stationStatus').value = station.status || 'active';
            document.getElementById('stationNotes').value = station.notes || '';
            document.getElementById('modalTitle').innerText = 'تعديل محطة';
            document.getElementById('stationModal').classList.add('active');
        }
    };

    window.deleteStation = async (id) => {
        if (confirm('هل أنت متأكد من حذف هذه المحطة؟')) {
            try {
                const result = await deleteStation(id);
                if (result.success) {
                    loadStations();
                    if (window.parent && window.parent.showToast) {
                        window.parent.showToast(result.message);
                    }
                } else {
                    alert(result.message || 'لا يمكن حذف المحطة');
                }
            } catch (error) {
                console.error('Error deleting station:', error);
                alert('خطأ في الحذف: ' + error.message);
            }
        }
    };

    document.getElementById('addStationBtn').addEventListener('click', () => openModal(false));
    document.getElementById('stationForm').addEventListener('submit', saveStation);
    window.closeModal = closeModal;

    // بدء تحميل البيانات
    loadStations();
</script>
</body>
</html>
