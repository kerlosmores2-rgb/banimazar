<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة تكاليف المحطات - بني مزار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0f3b4f; color: #fff; padding: 20px; }
        
        /* الهيدر الموحد */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #00d4ff; padding-bottom: 15px; }
        .header-section h2 { color: #00d4ff; display: flex; align-items: center; gap: 10px; }

        /* الحاويات (Containers) */
        .card { background: #164a63; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .section-title { color: #f1c40f; margin-bottom: 15px; border-right: 4px solid #f1c40f; padding-right: 10px; font-size: 1.1rem; }
        
        /* الشبكة (Grid) */
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .grid-5 { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }

        /* المدخلات */
        label { display: block; font-size: 0.85rem; color: #00d4ff; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #2c3e50; color: white; font-family: 'Cairo'; }
        input[readonly] { background: rgba(0, 212, 255, 0.1); color: #2ecc71; font-weight: bold; border: 1px dashed #00d4ff; }

        /* الأزرار */
        .btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; font-family: 'Cairo'; transition: 0.3s; }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-success { background: #28a745; color: white; width: 100%; justify-content: center; font-size: 1.2rem; margin-top: 20px; }
        .btn-print { background: #f39c12; color: #000; }

        /* شريط الإجماليات */
        .total-strip { background: rgba(0, 212, 255, 0.2); padding: 10px; border-radius: 8px; text-align: center; margin-top: 10px; font-weight: bold; border: 1px solid #00d4ff; }

        /* إعدادات الطباعة */
        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            .btn, .no-print { display: none !important; }
            .card { background: white !important; color: black !important; box-shadow: none; border: 1px solid #000; }
            input, select { border: none !important; color: black !important; background: transparent !important; }
            .section-title { color: black !important; border-right: 4px solid black; }
            .header-section h2 { color: black !important; }
        }
    </style>
</head>
<body>

    <div class="header-section no-print">
        <h2><i class="fas fa-calculator"></i> منظومة تكاليف تشغيل المحطات</h2>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-print" onclick="window.print()"><i class="fas fa-print"></i> طباعة التقرير</button>
        </div>
    </div>

    <div class="card no-print">
        <div class="grid-3">
            <div>
                <label>اختر المحطة:</label>
                <select id="mainStation" onchange="loadAssets()"></select>
            </div>
            <div>
                <label>شهر المحاسبة:</label>
                <input type="month" id="accMonth" onchange="fetchPrevMonthData()">
            </div>
        </div>
    </div>

    <div class="card">
        <h3 class="section-title">أولاً: إنتاج المياه التقديري (ساعات التشغيل)</h3>
        <div class="grid-5" style="margin-bottom: 20px;">
            <div><label>طلمبة رقم 1</label><select id="p1_select" onchange="updateFlow(1)"></select></div>
            <div><label>التصرف (م3/س)</label><input type="number" id="p1_flow" readonly></div>
            <div><label>ساعات التشغيل</label><input type="number" id="p1_hrs" oninput="calcWater()"></div>
            <div><label>الكمية (م3)</label><input type="number" id="p1_total" readonly></div>
        </div>
        <div class="grid-5">
            <div><label>طلمبة رقم 2</label><select id="p2_select" onchange="updateFlow(2)"></select></div>
            <div><label>التصرف (م3/س)</label><input type="number" id="p2_flow" readonly></div>
            <div><label>ساعات التشغيل</label><input type="number" id="p2_hrs" oninput="calcWater()"></div>
            <div><label>الكمية (م3)</label><input type="number" id="p2_total" readonly></div>
        </div>
        <div class="total-strip">إجمالي كمية المياه المنتجة خلال الشهر: <span id="grandWater">0</span> م3</div>
    </div>

    <div class="card">
        <h3 class="section-title" style="color: #00d4ff; border-right-color: #00d4ff;">ثانياً: استهلاك القوى الكهربائية</h3>
        <div class="grid-5" style="margin-bottom: 15px;">
            <div><label>عداد (1)</label><b>الرئيسي</b></div>
            <div><label>قراءة سابقة</label><input type="number" id="e1_prev" readonly></div>
            <div><label>قراءة حالية</label><input type="number" id="e1_curr" oninput="calcElec()"></div>
            <div><label>الاستهلاك</label><input type="number" id="e1_diff" readonly></div>
            <div><label>الفاتورة (ج.م)</label><input type="number" id="e1_bill" oninput="calcElec()"></div>
        </div>
        <div class="grid-5">
            <div><label>عداد (2)</label><b>الفرعي</b></div>
            <div><label>قراءة سابقة</label><input type="number" id="e2_prev" readonly></div>
            <div><label>قراءة حالية</label><input type="number" id="e2_curr" oninput="calcElec()"></div>
            <div><label>الاستهلاك</label><input type="number" id="e2_diff" readonly></div>
            <div><label>الفاتورة (ج.م)</label><input type="number" id="e2_bill" oninput="calcElec()"></div>
        </div>
        <div class="total-strip">إجمالي فاتورة الكهرباء: <span id="totalBills">0</span> ج.م</div>
    </div>

    <div class="card">
        <h3 class="section-title" style="color: #e67e22; border-right-color: #e67e22;">ثالثاً: ميزانية السولار (المولد الاحتياطي)</h3>
        <div class="grid-5">
            <div><label>رصيد سابق</label><input type="number" id="sol_prev" readonly></div>
            <div><label>سولار مضاف</label><input type="number" id="sol_added" oninput="calcSolar()"></div>
            <div><label>ساعات (حمل)</label><input type="number" id="sol_h_load" oninput="calcSolar()"></div>
            <div><label>ساعات (بدون)</label><input type="number" id="sol_h_idle" oninput="calcSolar()"></div>
            <div><label>الرصيد المتبقي</label><input type="number" id="sol_final" readonly></div>
        </div>
    </div>

    <button class="btn btn-success no-print" onclick="saveReport()"><i class="fas fa-save"></i> حفظ واعتماد التقرير الشهري</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let pumpsData = [], gensData = [];

        async function init() {
            const { data } = await supabaseClient.from('stations').select('*');
            const sel = document.getElementById('mainStation');
            sel.innerHTML = '<option value="">-- اختر المحطة --</option>';
            data.forEach(s => sel.innerHTML += `<option value="${s.id}">${s.station_name}</option>`);
        }

        async function loadAssets() {
            const sid = document.getElementById('mainStation').value;
            // جلب أصول المحطة المختارة
            const p1 = await supabaseClient.from('main_pumps').select('*').eq('station_id', sid);
            const p2 = await supabaseClient.from('sub_pumps').select('*').eq('station_id', sid);
            const gen = await supabaseClient.from('generators').select('*').eq('station_id', sid);

            pumpsData = [...(p1.data || []), ...(p2.data || [])];
            gensData = gen.data || [];

            ['p1_select', 'p2_select'].forEach(id => {
                const s = document.getElementById(id);
                s.innerHTML = '<option value="">اختر..</option>';
                pumpsData.forEach(p => s.innerHTML += `<option value="${p.id}">${p.asset_name || p.pump_number}</option>`);
            });
        }

        function updateFlow(num) {
            const id = document.getElementById(`p${num}_select`).value;
            const pump = pumpsData.find(x => String(x.id) === String(id));
            document.getElementById(`p${num}_flow`).value = pump ? pump.flow_rate : 0;
            calcWater();
        }

        function calcWater() {
            const t1 = (parseFloat(document.getElementById('p1_hrs').value) || 0) * (parseFloat(document.getElementById('p1_flow').value) || 0);
            const t2 = (parseFloat(document.getElementById('p2_hrs').value) || 0) * (parseFloat(document.getElementById('p2_flow').value) || 0);
            document.getElementById('p1_total').value = t1.toFixed(2);
            document.getElementById('p2_total').value = t2.toFixed(2);
            document.getElementById('grandWater').innerText = (t1 + t2).toFixed(2);
        }

        function calcElec() {
            const diff1 = (parseFloat(document.getElementById('e1_curr').value) || 0) - (parseFloat(document.getElementById('e1_prev').value) || 0);
            const diff2 = (parseFloat(document.getElementById('e2_curr').value) || 0) - (parseFloat(document.getElementById('e2_prev').value) || 0);
            document.getElementById('e1_diff').value = diff1;
            document.getElementById('e2_diff').value = diff2;
            document.getElementById('totalBills').innerText = (parseFloat(document.getElementById('e1_bill').value) || 0) + (parseFloat(document.getElementById('e2_bill').value) || 0);
        }

        function calcSolar() {
            const prev = parseFloat(document.getElementById('sol_prev').value) || 0;
            const added = parseFloat(document.getElementById('sol_added').value) || 0;
            const hl = parseFloat(document.getElementById('sol_h_load').value) || 0;
            const hi = parseFloat(document.getElementById('sol_h_idle').value) || 0;
            const rate = gensData[0] ? gensData[0].consumption_rate : 7; // معدل افتراضي لو مفيش بيانات
            
            const consumed = (hl * rate) + (hi * (rate * 0.5));
            document.getElementById('sol_final').value = (prev + added - consumed).toFixed(2);
        }

        async function fetchPrevMonthData() {
            const sid = document.getElementById('mainStation').value;
            const month = document.getElementById('accMonth').value;
            if(!sid || !month) return;

            let d = new Date(month + "-01");
            d.setMonth(d.getMonth() - 1);
            const prevStr = d.toISOString().split('T')[0];

            const { data } = await supabaseClient.from('station_costs').select('*').eq('station_id', sid).eq('accounting_month', prevStr).single();
            if(data) {
                document.getElementById('e1_prev').value = data.elec1_curr;
                document.getElementById('e2_prev').value = data.elec2_curr;
                document.getElementById('sol_prev').value = data.solar_current_balance;
            } else {
                alert("لم يتم العثور على بيانات الشهر السابق. يرجى إدخال القراءات السابقة يدوياً.");
                ['e1_prev', 'e2_prev', 'sol_prev'].forEach(id => document.getElementById(id).readOnly = false);
            }
        }

        async function saveReport() {
            const payload = {
                station_id: document.getElementById('mainStation').value,
                station_name: document.getElementById('mainStation').options[document.getElementById('mainStation').selectedIndex].text,
                accounting_month: document.getElementById('accMonth').value + "-01",
                elec1_curr: document.getElementById('e1_curr').value,
                elec2_curr: document.getElementById('e2_curr').value,
                solar_current_balance: document.getElementById('sol_final').value
                // يمكنك إضافة باقي الحقول هنا للحفظ في قاعدة البيانات
            };
            const { error } = await supabaseClient.from('station_costs').insert([payload]);
            if(!error) alert("تم حفظ واعتماد التقرير بنجاح ✅");
        }

        init();
    </script>
</body>
</html>
