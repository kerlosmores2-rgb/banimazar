<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تكاليف محطات بني مزار - المطور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        :root { --primary: #00d4ff; --secondary: #164a63; --bg: #0b2533; --success: #2ecc71; --warning: #f1c40f; --danger: #e74c3c; --text: #e0f2f1; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .pricing-bar { background: rgba(0,212,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; border: 1px solid var(--primary); align-items: center; justify-content: center; }
        .pricing-bar input { width: 90px; background: #071a24; color: var(--success); border: 1px solid var(--primary); text-align: center; border-radius: 5px; padding: 5px; }
        .card { background: var(--secondary); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { padding: 12px; border-bottom: 2px solid var(--primary); color: var(--primary); background: rgba(0,0,0,0.2); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:1000; padding: 10px; }
        .modal-content { background: var(--secondary); width:100%; max-width:1100px; padding:25px; border-radius:20px; max-height:95vh; overflow-y:auto; border: 2px solid var(--primary); }
        .section-box { background: rgba(0,0,0,0.2); border: 1px solid rgba(0,212,255,0.2); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .section-title { color: var(--warning); font-weight: bold; margin-bottom: 10px; border-right: 4px solid var(--warning); padding-right: 10px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8rem; color: #b0bec5; }
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #263238; background: #0b2533; color: #fff; }
        input[readonly] { background: rgba(0,0,0,0.3); color: var(--success); font-weight: bold; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-edit { background: var(--warning); color: #000; margin-left: 5px; }
        .btn-del { background: var(--danger); color: #fff; }
    </style>
</head>
<body>

    <div class="pricing-bar">
        <div><label>الكهرباء:</label> <input type="number" id="cfg_elec" step="0.01" onchange="saveCfg()"></div>
        <div><label>السولار:</label> <input type="number" id="cfg_solar" step="0.01" onchange="saveCfg()"></div>
        <div><label>المياه:</label> <input type="number" id="cfg_water" step="0.01" onchange="saveCfg()"></div>
        <button class="btn" style="background:var(--success); color:white" onclick="prepareAdd()"><i class="fas fa-plus"></i> إضافة تقرير جديد</button>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>المحطة</th><th>الشهر</th><th>مياه مرفوعة</th><th>ك.و</th><th>فاتورة كهرباء</th><th>سولار</th><th>إجمالي</th><th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="modal" id="entryModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color:var(--primary); text-align:center; margin-bottom:20px;">تسجيل تقرير جديد</h3>
            <form id="mainForm">
                <input type="hidden" id="edit_id">
                
                <div class="form-grid">
                    <div class="input-group"><label>المحطة</label><select id="f_station" required onchange="fetchData()"></select></div>
                    <div class="input-group"><label>عن شهر</label><input type="month" id="f_month" required onchange="fetchData()"></div>
                </div>

                <div class="section-box">
                    <div class="section-title">مياه المرفوعة</div>
                    <div class="form-grid">
                        <div class="input-group"><label>طلمبة 1</label><select id="p1_sel" onchange="upPump(1)"></select></div>
                        <div class="input-group"><label>ساعات (1)</label><input type="number" id="h1" value="0" step="0.1" oninput="calc()"></div>
                        <div class="input-group"><label>طلمبة 2</label><select id="p2_sel" onchange="upPump(2)"></select></div>
                        <div class="input-group"><label>ساعات (2)</label><input type="number" id="h2" value="0" step="0.1" oninput="calc()"></div>
                    </div>
                    <div style="font-size:0.9rem; color:var(--primary)">الإجمالي: <span id="res_total_q">0</span> م3</div>
                </div>

                <div class="section-box">
                    <div class="section-title">الكهرباء والسولار</div>
                    <div class="form-grid">
                        <div class="input-group"><label>سابق م1</label><input type="number" id="e1_p" readonly></div>
                        <div class="input-group"><label>حالي م1</label><input type="number" id="e1_c" value="0" oninput="calc()"></div>
                        <div class="input-group"><label>سابق م2</label><input type="number" id="e2_p" readonly></div>
                        <div class="input-group"><label>حالي م2</label><input type="number" id="e2_c" value="0" oninput="calc()"></div>
                    </div>
                    <div class="form-grid" style="margin-top:10px; border-top:1px solid #444; padding-top:10px;">
                        <div class="input-group"><label>معدل الحمل</label><input type="number" id="g_rate_load" readonly></div>
                        <div class="input-group"><label>ساعات حمل</label><input type="number" id="s_h_load" value="0" step="0.1" oninput="calc()"></div>
                        <div class="input-group"><label>معدل بدون</label><input type="number" id="g_rate_no" readonly></div>
                        <div class="input-group"><label>ساعات بدون</label><input type="number" id="s_h_no" value="0" step="0.1" oninput="calc()"></div>
                    </div>
                    <div class="form-grid">
                        <div class="input-group"><label>مضاف (+)</label><input type="number" id="s_added" value="0" oninput="calc()"></div>
                        <div class="input-group"><label>رصيد سابق</label><input type="number" id="s_prev_bal" readonly></div>
                        <div class="input-group"><label>رصيد حالي</label><input type="number" id="s_curr_bal" readonly></div>
                    </div>
                </div>

                <div class="section-box">
                    <div class="section-title">مياه الشرب</div>
                    <div class="form-grid">
                        <div class="input-group"><label>سابق عداد</label><input type="number" id="w_prev" readonly></div>
                        <div class="input-group"><label>حالي عداد</label><input type="number" id="w_curr" value="0" oninput="calc()"></div>
                    </div>
                </div>

                <div style="background:var(--primary); color:#000; padding:10px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom:15px;">
                    إجمالي التكاليف: <span id="grand_total">0</span> ج.م
                </div>

                <button type="submit" class="btn" style="background:var(--primary); color:#000; width:100%; justify-content:center">حفظ التقرير</button>
                <button type="button" class="btn" style="background:#444; color:#fff; width:100%; margin-top:10px; justify-content:center" onclick="closeModal()">إلغاء</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://jvfbkoaeugkeoiccvnkq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_n64Hnhuruc3Oeolj-Uwg9g_tu-otJlZ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let DB = { stations:[], pumps:[], gens:[] };

        const num = (id) => {
            const el = document.getElementById(id);
            if (!el) return 0;
            return el.value === "" ? 0 : parseFloat(el.value);
        };

        async function init() {
            ['cfg_elec', 'cfg_solar', 'cfg_water'].forEach(id => document.getElementById(id).value = localStorage.getItem(id) || 0);
            const { data: st } = await _supabase.from('stations').select('*');
            const { data: pm } = await _supabase.from('main_pumps').select('*');
            const { data: gn } = await _supabase.from('generators').select('*');
            DB = { stations: st||[], pumps: pm||[], gens: gn||[] };
            document.getElementById('f_station').innerHTML = '<option value="">-- اختر المحطة --</option>' + DB.stations.map(s => `<option value="${s.id}">${s.station_name}</option>`).join('');
            loadTable();
        }

        async function fetchData() {
            const sid = document.getElementById('f_station').value;
            const month = document.getElementById('f_month').value;
            if(!sid) return;

            // جلب الطلمبات والمولد
            const sPumps = DB.pumps.filter(p => String(p.station_id) === String(sid));
            ['p1_sel', 'p2_sel'].forEach(id => {
                document.getElementById(id).innerHTML = '<option value="0" data-flow="0">-- اختر --</option>' + sPumps.map(p => `<option value="${p.id}" data-flow="${p.flow_rate_m3h || 0}">${p.pump_number || 'طلمبة'}</option>`).join('');
            });

            // جلب معدلات السولار (تأكد من اسم العمود fuel_with_load في Supabase)
            const gen = DB.gens.find(g => String(g.station_id) === String(sid));
            document.getElementById('g_rate_load').value = gen?.fuel_with_load || 0;
            document.getElementById('g_rate_no').value = gen?.fuel_no_load || 0;

            if(month && !document.getElementById('edit_id').value) {
                const { data: last } = await _supabase.from('station_costs').select('*').eq('station_id', sid).order('accounting_month', {ascending: false}).limit(1);
                if(last && last[0]) {
                    document.getElementById('e1_p').value = last[0].e1_curr || 0;
                    document.getElementById('e2_p').value = last[0].e2_curr || 0;
                    document.getElementById('w_prev').value = last[0].w_curr || 0;
                    document.getElementById('s_prev_bal').value = last[0].solar_current_balance || 0;
                }
            }
            calc();
        }

        function calc() {
            const pE = num('cfg_elec'), pS = num('cfg_solar'), pW = num('cfg_water');
            const q1 = num('h1') * (parseFloat(document.getElementById('p1_sel').options[document.getElementById('p1_sel').selectedIndex]?.dataset.flow)||0);
            const q2 = num('h2') * (parseFloat(document.getElementById('p2_sel').options[document.getElementById('p2_sel').selectedIndex]?.dataset.flow)||0);
            const totQ = q1 + q2;
            document.getElementById('res_total_q').innerText = totQ.toFixed(2);

            const d1 = Math.max(0, num('e1_c') - num('e1_p')), d2 = Math.max(0, num('e2_c') - num('e2_p'));
            const sCons = (num('s_h_load') * num('g_rate_load')) + (num('s_h_no') * num('g_rate_no'));
            document.getElementById('s_curr_bal').value = (num('s_prev_bal') + num('s_added') - sCons).toFixed(2);
            
            const wD = Math.max(0, num('w_curr') - num('w_prev'));
            const cost = ((d1 + d2) * pE) + (sCons * pS) + (wD * pW);
            document.getElementById('grand_total').innerText = cost.toLocaleString();
            return { totQ, sCons, kw: (d1+d2) };
        }

        document.getElementById('mainForm').onsubmit = async (e) => {
            e.preventDefault();
            const results = calc();
            const editId = document.getElementById('edit_id').value;
            const monthDate = document.getElementById('f_month').value + "-01";
            const sid = document.getElementById('f_station').value;

            // منع التكرار في حالة الإضافة الجديدة فقط
            if (!editId) {
                const { data: existing } = await _supabase.from('station_costs').select('id').eq('station_id', sid).eq('accounting_month', monthDate);
                if (existing && existing.length > 0) {
                    alert('خطأ: يوجد تقرير مسجل بالفعل لهذه المحطة في هذا الشهر.');
                    return;
                }
            }

            const payload = {
                station_id: sid,
                station_name: document.getElementById('f_station').options[document.getElementById('f_station').selectedIndex].text,
                accounting_month: monthDate,
                total_water_produced: results.totQ,
                total_kw: results.kw,
                solar_consumed: results.sCons,
                e1_curr: num('e1_c'), e2_curr: num('e2_c'),
                w_curr: num('w_curr'), w_prev: num('w_prev'),
                solar_current_balance: num('s_curr_bal'),
                h1: num('h1'), h2: num('h2'),
                s_h_load: num('s_h_load'), s_h_no: num('s_h_no'),
                solar_added: num('s_added')
            };

            let res;
            if (editId) {
                res = await _supabase.from('station_costs').update(payload).eq('id', editId);
            } else {
                res = await _supabase.from('station_costs').insert([payload]);
            }

            if(!res.error) { alert('تم الحفظ بنجاح'); closeModal(); loadTable(); } 
            else alert('خطأ: ' + res.error.message);
        };

        async function loadTable() {
            const { data } = await _supabase.from('station_costs').select('*').order('accounting_month',{ascending:false});
            const pE = num('cfg_elec'), pS = num('cfg_solar');
            document.getElementById('tableBody').innerHTML = (data||[]).map(r => `
                <tr>
                    <td>${r.station_name}</td>
                    <td>${r.accounting_month.substring(0,7)}</td>
                    <td>${r.total_water_produced}</td>
                    <td>${r.total_kw}</td>
                    <td>${(r.total_kw*pE).toLocaleString()}</td>
                    <td>${r.solar_consumed}</td>
                    <td style="font-weight:bold; color:var(--primary)">${((r.total_kw*pE)+(r.solar_consumed*pS)).toLocaleString()}</td>
                    <td>
                        <button onclick="editRec('${r.id}')" class="btn btn-edit"><i class="fas fa-edit"></i></button>
                        <button onclick="delRec('${r.id}')" class="btn btn-del"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function editRec(id) {
            const { data } = await _supabase.from('station_costs').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('edit_id').value = data.id;
                document.getElementById('modalTitle').innerText = "تعديل تقرير: " + data.station_name;
                document.getElementById('f_station').value = data.station_id;
                document.getElementById('f_month').value = data.accounting_month.substring(0, 7);
                await fetchData(); // لتحميل الطلمبات والمعدلات
                document.getElementById('e1_c').value = data.e1_curr;
                document.getElementById('e2_c').value = data.e2_curr;
                document.getElementById('h1').value = data.h1;
                document.getElementById('h2').value = data.h2;
                document.getElementById('s_h_load').value = data.s_h_load;
                document.getElementById('s_h_no').value = data.s_h_no;
                document.getElementById('s_added').value = data.solar_added;
                document.getElementById('w_curr').value = data.w_curr;
                openModal();
                calc();
            }
        }

        async function delRec(id) {
            if (confirm('هل أنت متأكد من الحذف نهائياً؟')) {
                const { error } = await _supabase.from('station_costs').delete().eq('id', id);
                if (!error) loadTable();
            }
        }

        function saveCfg() {
            ['cfg_elec', 'cfg_solar', 'cfg_water'].forEach(id => localStorage.setItem(id, document.getElementById(id).value));
            loadTable();
        }
        function prepareAdd() {
            document.getElementById('mainForm').reset();
            document.getElementById('edit_id').value = "";
            document.getElementById('modalTitle').innerText = "تسجيل تقرير جديد";
            openModal();
        }
        function openModal() { document.getElementById('entryModal').style.display='flex'; }
        function closeModal() { document.getElementById('entryModal').style.display='none'; }
        init();
    </script>
</body>
</html>
