<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
</head>
<body>
    <h3>تسجيل الدخول</h3>
    <input type="text" id="username" placeholder="الكود الوظيفي">
    <input type="password" id="password" placeholder="الرقم السري">
    <button onclick="login()">دخول</button>
    <div id="result"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://pbzpumetrmirnsshjdoe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_O9BKPIjk5xXvbGNjvsBXVw_9V_TIoUu';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window.supabaseClient = supabaseClient;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'جاري التحقق...';
            
            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password);
            
            if (error) {
                resultDiv.innerHTML = 'خطأ: ' + error.message;
                return;
            }
            
            if (data && data.length > 0) {
                localStorage.setItem('loggedUser', JSON.stringify(data[0]));
                resultDiv.innerHTML = '✅ تم تسجيل الدخول! جاري التحويل...';
                window.location.href = 'dashboard.html';
            } else {
                resultDiv.innerHTML = '❌ الكود أو الرقم السري غير صحيح';
            }
        }
    </script>
</body>
</html>
