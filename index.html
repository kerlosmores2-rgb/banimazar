
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام محطات الصرف الصحي - بني مزار</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: white;
            overflow: hidden;
        }
        .login-header {
            background: #0d6efd;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .btn-login {
            padding: 12px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card">
                <div class="login-header">
                    <i class="fas fa-water fa-3x mb-3"></i>
                    <h3>نظام إدارة المحطات</h3>
                    <p class="mb-0">فرع بني مزار</p>
                </div>
                <div class="card-body p-4">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">اسم المستخدم</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text" id="username" class="form-control" required placeholder="أدخل اسم المستخدم">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">كلمة المرور</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" id="password" class="form-control" required placeholder="أدخل كلمة المرور">
                            </div>
                        </div>
                        <div id="errorMsg" class="alert alert-danger d-none mb-3">
                            خطأ في اسم المستخدم أو كلمة المرور
                        </div>
                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 btn-login">
                            <span id="btnText">تسجيل الدخول</span>
                            <span id="btnLoader" class="spinner-border spinner-border-sm d-none"></span>
                        </button>
                    </form>
                </div>
                <div class="card-footer text-center py-3 bg-light">
                    <small class="text-muted">الشركة القابضة لمياه الشرب والصرف الصحي</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. إعدادات Supabase (ضع بياناتك هنا)
    const SUPABASE_URL = 'https://pbzpumetrmirnsshjdoe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_O9BKPIjk5xXvbGNjvsBXVw_9V_TIoUu';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');

    loginForm.onsubmit = async function(e) {
        e.preventDefault();
        
        // إظهار حالة التحميل
        errorMsg.classList.add('d-none');
        btnText.classList.add('d-none');
        btnLoader.classList.remove('d-none');
        submitBtn.disabled = true;

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            // 2. الاستعلام من قاعدة البيانات
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password);

            if (error) throw error;

            if (data && data.length > 0) {
                const user = data[0];
                
                // 3. حفظ بيانات الجلسة
                sessionStorage.setItem('loggedUser', JSON.stringify(user));
                sessionStorage.setItem('loginTime', Date.now());

                // الانتقال للوحة التحكم
                window.location.href = 'dashboard.html';
            } else {
                // بيانات خاطئة
                errorMsg.classList.remove('d-none');
            }
        } catch (err) {
            console.error('خطأ أثناء الدخول:', err);
            errorMsg.textContent = 'حدث خطأ في الاتصال بالسيرفر';
            errorMsg.classList.remove('d-none');
        } finally {
            // إعادة الزر لحالته الأصلية
            btnText.classList.remove('d-none');
            btnLoader.classList.add('d-none');
            submitBtn.disabled = false;
        }
    };
</script>

</body>
</html>
