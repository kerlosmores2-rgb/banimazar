<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
</head>
<body>
    <div style="max-width:400px; margin:50px auto; text-align:center;">
        <h3>نظام محطات الصرف الصحي</h3>
        <div id="errorMsg" style="color:red;"></div>
        <input type="text" id="username" placeholder="الكود الوظيفي" style="width:100%; padding:10px; margin:10px 0;"><br>
        <input type="password" id="password" placeholder="الرقم السري" style="width:100%; padding:10px; margin:10px 0;"><br>
        <button onclick="login()" style="width:100%; padding:10px; background:#0d6efd; color:white; border:none;">دخول</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://pbzpumetrmirnsshjdoe.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_O9BKPIjk5xXvbGNjvsBXVw_9V_TIoUu';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window.supabaseClient = supabaseClient;

        if (localStorage.getItem('loggedUser')) {
            window.location.href = 'dashboard.html';
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerHTML = 'جاري التحقق...';

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password);

                if (error) throw error;

                if (data && data.length > 0) {
                    const user = data[0];
                    localStorage.setItem('loggedUser', JSON.stringify({
                        id: user.id,
                        username: user.username,
                        name: user.name,
                        role: user.role
                    }));
                    localStorage.setItem('loginTime', Date.now());
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.innerHTML = '❌ الكود الوظيفي أو الرقم السري غير صحيح';
                }
            } catch (err) {
                errorDiv.innerHTML = 'خطأ: ' + err.message;
            }
        }
    </script>
</body>
</html>
