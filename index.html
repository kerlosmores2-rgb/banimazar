<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام محطات الصرف الصحي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Tahoma', sans-serif;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: none;
        }
        .card-header {
            background: #0d6efd;
            color: white;
            text-align: center;
            border-radius: 20px 20px 0 0;
            padding: 25px;
        }
        .btn-login {
            background: #0d6efd;
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }
        .footer-text {
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header">
                    <h5>شركة مياه الشرب والصرف الصحي بالمنيا</h5>
                    <small>فرع بني مزار - إدارة محطات الصرف الصحي</small>
                </div>
                <div class="card-body p-4">
                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label>اسم المستخدم</label>
                            <input type="text" id="username" class="form-control" placeholder="اسم المستخدم" required>
                        </div>
                        <div class="mb-3">
                            <label>كلمة المرور</label>
                            <input type="password" id="password" class="form-control" placeholder="كلمة المرور" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label">تذكرني</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-login">دخول</button>
                    </form>
                    <div class="footer-text mt-3">
                        تم إعداد النظام بواسطة فني / كيرلس موريس يعقوب
                    </div>
                    <div class="footer-text">نائب مدير الفرع مهندس / منصور رجب عبدالله</div>
                    <div class="footer-text">مدير عام الفرع مهندسة / زينب أحمد عبدالمنعم</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // تهيئة Supabase
    const SUPABASE_URL = 'https://pbzpumetrmirnsshjdoe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_O9BKPIjk5xXvbGNjvsBXVw_9V_TIoUu';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    window.supabaseClient = supabaseClient; // تعريفه عالمياً

    // التحقق من تسجيل الدخول السابق
    (function checkExistingSession() {
        const loggedUser = localStorage.getItem('loggedUser');
        if (loggedUser) {
            window.location.href = 'dashboard.html';
        }
    })();

    // تسجيل الدخول
    document.getElementById('loginForm').onsubmit = async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');

        errorDiv.classList.add('d-none');
        try {
            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password', password);

            if (error) throw error;

            if (data && data.length > 0) {
                const user = data[0];
                localStorage.setItem('loggedUser', JSON.stringify({
                    id: user.id,
                    username: user.username,
                    name: user.name,
                    role: user.role
                }));
                localStorage.setItem('loginTime', Date.now());
                if (document.getElementById('remember').checked) {
                    localStorage.setItem('rememberedUser', username);
                }
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
                errorDiv.classList.remove('d-none');
            }
        } catch (err) {
            console.error(err);
            errorDiv.textContent = 'خطأ في الاتصال بقاعدة البيانات: ' + err.message;
            errorDiv.classList.remove('d-none');
        }
    };

    // تذكر المستخدم
    const remembered = localStorage.getItem('rememberedUser');
    if (remembered) {
        document.getElementById('username').value = remembered;
        document.getElementById('remember').checked = true;
    }
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://pbzpumetrmirnsshjdoe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_O9BKPIjk5xXvbGNjvsBXVw_9V_TIoUu';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    window.supabaseClient = supabaseClient;
    
    console.log('✅ Supabase جاهز', supabaseClient);
</script>
</script>
</body>
</html>
