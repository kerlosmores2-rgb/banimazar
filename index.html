<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-primary text-white text-center">
                    <h4>تسجيل الدخول</h4>
                </div>
                <div class="card-body">
                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label>اسم المستخدم</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>كلمة المرور</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">دخول</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://pbzpumetrmirnsshjdoe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_O9BKPIjk5xXvbGNjvsBXVw_9V_TIoUu';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    window.supabaseClient = supabaseClient;

    document.getElementById('loginForm').onsubmit = async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        
        errorDiv.classList.add('d-none');
        
        console.log('🔐 محاولة دخول:', username);
        
        // جلب المستخدم من قاعدة البيانات
        const { data, error } = await supabaseClient
            .from('users')
            .select('*')
            .eq('username', username)
            .eq('password', password);
        
        console.log('📊 النتيجة:', data);
        
        if (error) {
            console.error('خطأ:', error);
            errorDiv.textContent = 'خطأ في الاتصال: ' + error.message;
            errorDiv.classList.remove('d-none');
            return;
        }
        
        if (data && data.length > 0) {
            const user = data[0];
            console.log('✅ تم تسجيل الدخول:', user.name);
            localStorage.setItem('loggedUser', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        } else {
            console.log('❌ فشل: المستخدم غير موجود');
            errorDiv.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
            errorDiv.classList.remove('d-none');
            
            // عرض جميع المستخدمين للمساعدة
            const { data: allUsers } = await supabaseClient.from('users').select('*');
            console.log('📋 جميع المستخدمين:', allUsers);
        }
    };
</script>
</body>
</html>
